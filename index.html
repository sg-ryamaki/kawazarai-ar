<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Water Dragon WebAR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');
    :root{--water:#5ecfff;--water-deep:#1a7fff;--glow:rgba(94,207,255,0.55);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Noto Serif JP',serif;}
    #app{position:fixed;inset:0;background:#000;}
    #bgVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
    /* ガイド */
    #guide{position:absolute;inset:0;z-index:10;pointer-events:none;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;}
    .guide-box{width:min(78vw,78vh,400px);aspect-ratio:1/1;position:relative;transition:opacity .3s;}
    .guide-box::before,.guide-box::after,.guide-corner-br,.guide-corner-bl{content:'';position:absolute;width:32px;height:32px;border-color:var(--water);border-style:solid;border-width:0;}
    .guide-box::before{top:0;left:0;border-top-width:3px;border-left-width:3px;border-top-left-radius:6px;animation:cornerPulse 2s ease-in-out infinite;}
    .guide-box::after{top:0;right:0;border-top-width:3px;border-right-width:3px;border-top-right-radius:6px;animation:cornerPulse 2s ease-in-out infinite .5s;}
    .guide-corner-br{bottom:0;right:0;border-bottom-width:3px;border-right-width:3px;border-bottom-right-radius:6px;animation:cornerPulse 2s ease-in-out infinite 1s;}
    .guide-corner-bl{bottom:0;left:0;border-bottom-width:3px;border-left-width:3px;border-bottom-left-radius:6px;animation:cornerPulse 2s ease-in-out infinite 1.5s;}
    .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--water),rgba(94,207,255,.6),transparent);top:0;animation:scanMove 3s linear infinite;opacity:.75;}
    .guide-label{color:rgba(94,207,255,.85);font-size:13px;letter-spacing:.2em;text-shadow:0 0 10px var(--glow);animation:labelBlink 2s ease-in-out infinite;}
    .guide-hidden .guide-box,.guide-hidden .guide-label{opacity:0;}
    /* ARステージ */
    #arStage{position:absolute;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity .5s ease;}
    #arStage.active{opacity:1;}
    /* 召喚フラッシュ */
    #summonFlash{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.92),rgba(94,207,255,.4) 40%,transparent 70%);opacity:0;pointer-events:none;z-index:50;}
    #summonFlash.flash{animation:summonBurst .65s ease-out forwards;}
    /* 魔法陣 */
    #hexagram{position:absolute;left:50%;top:50%;width:min(90vw,90vh,500px);aspect-ratio:1/1;transform:translate(-50%,-50%);opacity:0;pointer-events:none;}
    #hexagram svg{width:100%;height:100%;animation:hexaSpin 18s linear infinite;filter:drop-shadow(0 0 6px var(--water)) drop-shadow(0 0 16px rgba(94,207,255,.4));}
    #arStage.active #hexagram{animation:hexaFadeIn .8s .1s forwards;}
    /* オーラ */
    #auraLayer{position:absolute;inset:-10%;background:radial-gradient(circle at 50% 52%,rgba(94,207,255,.28) 0%,rgba(94,207,255,.10) 26%,transparent 52%),radial-gradient(circle at 50% 42%,rgba(255,255,255,.14) 0%,rgba(255,255,255,.05) 24%,transparent 46%);filter:blur(14px);mix-blend-mode:screen;animation:auraPulse 4.5s ease-in-out infinite;}
    /* エネルギーリング */
    #energyRings{position:absolute;left:50%;top:50%;width:min(85vw,85vh,460px);aspect-ratio:1/1;transform:translate(-50%,-50%);pointer-events:none;}
    .ering{position:absolute;border-radius:50%;border:1px solid rgba(94,207,255,.25);left:50%;top:50%;transform:translate(-50%,-50%);animation:ringPulse 4s ease-in-out infinite;}
    .ering:nth-child(1){width:60%;height:60%;animation-delay:0s;}
    .ering:nth-child(2){width:75%;height:75%;animation-delay:.8s;border-color:rgba(94,207,255,.18);}
    .ering:nth-child(3){width:90%;height:90%;animation-delay:1.6s;border-color:rgba(94,207,255,.12);}
    .ering:nth-child(4){width:105%;height:105%;animation-delay:2.4s;border-color:rgba(94,207,255,.08);}
    /* 波紋 */
    #rippleLayer{position:absolute;left:50%;bottom:4%;width:min(75vw,75vh,440px);height:min(20vw,20vh,120px);transform:translateX(-50%);opacity:.7;}
    .ripple{position:absolute;left:50%;bottom:0;border:1.5px solid rgba(94,207,255,.5);border-radius:50%;transform:translateX(-50%) scale(.55);opacity:0;mix-blend-mode:screen;}
    .r1{width:38%;height:26%;animation:rippleWave 3s linear infinite;}
    .r2{width:58%;height:38%;animation:rippleWave 3s linear infinite .95s;}
    .r3{width:80%;height:52%;animation:rippleWave 3s linear infinite 1.9s;}
    /* パーティクル */
    #sparkleLayer{position:absolute;inset:0;overflow:hidden;pointer-events:none;mix-blend-mode:screen;}
    .spark{position:absolute;width:7px;height:7px;background:radial-gradient(circle,rgba(255,255,255,.95) 0%,rgba(140,230,255,.7) 48%,transparent 72%);border-radius:50%;opacity:0;filter:blur(.3px);animation:sparkFloat linear infinite;}
    .drift{position:absolute;width:14px;height:14px;background:radial-gradient(circle,rgba(94,207,255,.55) 0%,transparent 68%);border-radius:50%;opacity:0;animation:driftFloat ease-in-out infinite;}
    /* 画像 */
    #contentWrap{position:absolute;inset:0;display:grid;place-items:center;overflow:hidden;}
    #stepImg{width:100%;height:100%;object-fit:cover;opacity:0;transform:scale(1.1) translateY(16px);filter:drop-shadow(0 0 12px rgba(94,207,255,.28)) drop-shadow(0 0 28px rgba(94,207,255,.20)) brightness(1.03) saturate(1.03);transition:opacity .6s ease,transform .75s cubic-bezier(.18,.85,.22,1);}
    #stepImg.visible{opacity:1;transform:scale(1) translateY(0);animation:floatDrift 6s ease-in-out infinite,breathe 5s ease-in-out infinite;}
    /* インジケーター */
    #stepDots{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:9px;z-index:30;pointer-events:none;opacity:0;transition:opacity .4s;}
    #arStage.active #stepDots{opacity:1;}
    .dot{width:8px;height:8px;border-radius:50%;background:rgba(94,207,255,.28);border:1px solid rgba(94,207,255,.55);transition:all .35s ease;}
    .dot.on{background:var(--water);box-shadow:0 0 8px var(--water),0 0 16px rgba(94,207,255,.5);transform:scale(1.3);}
    /* 光ベール */
    #glowVeil{position:absolute;inset:0;background:radial-gradient(circle at 50% 36%,rgba(255,255,255,.18),rgba(255,255,255,.05) 26%,transparent 46%),radial-gradient(circle at 52% 66%,rgba(94,207,255,.14),rgba(94,207,255,.04) 26%,transparent 44%);mix-blend-mode:screen;animation:glowPulse 5s ease-in-out infinite;}
    /* HUD */
    #hudTL,#hudBR{position:absolute;width:60px;height:60px;z-index:25;pointer-events:none;opacity:.55;}
    #hudTL{top:12px;left:12px;}
    #hudBR{bottom:12px;right:12px;transform:rotate(180deg);}
    /* オーバーレイ */
    #overlay{position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,rgba(0,8,20,.92) 0%,rgba(0,22,48,.88) 100%);}
    #overlay.hidden{display:none;}
    .panel{width:min(340px,94vw);border-radius:22px;background:rgba(0,15,35,.85);border:1px solid rgba(94,207,255,.22);box-shadow:0 0 0 1px rgba(94,207,255,.06),0 0 40px rgba(94,207,255,.12),inset 0 1px 0 rgba(255,255,255,.06);color:#fff;padding:36px 28px 32px;text-align:center;backdrop-filter:blur(12px);position:relative;overflow:hidden;}
    .panel::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(94,207,255,.6),transparent);}
    .panel-icon{font-size:42px;margin-bottom:10px;display:block;filter:drop-shadow(0 0 10px rgba(94,207,255,.6));animation:iconFloat 3s ease-in-out infinite;}
    .panel-title{font-size:20px;font-weight:700;color:var(--water);letter-spacing:.12em;text-shadow:0 0 14px var(--glow);margin-bottom:6px;}
    .panel-sub{font-size:13px;color:rgba(255,255,255,.55);letter-spacing:.05em;margin-bottom:28px;line-height:1.8;}
    .btn{appearance:none;border:none;border-radius:14px;background:linear-gradient(160deg,#1e8fff 0%,#0a5acc 100%);color:#fff;padding:15px 40px;font-size:17px;font-weight:700;font-family:'Noto Serif JP',serif;cursor:pointer;width:100%;letter-spacing:.12em;box-shadow:0 6px 20px rgba(10,90,204,.45),inset 0 1px 0 rgba(255,255,255,.18);transition:transform .15s,box-shadow .15s;}
    .btn:active{transform:scale(.97);}
    .btn:disabled{opacity:.6;cursor:default;}
    #retryBtn{margin-top:10px;background:linear-gradient(160deg,#555 0%,#333 100%);box-shadow:0 4px 14px rgba(0,0,0,.3);display:none;}
    #errorText{margin-top:14px;white-space:pre-wrap;text-align:left;font-size:12px;line-height:1.65;color:#ffb0b0;display:none;font-family:-apple-system,sans-serif;}
    #procCanvas{display:none;}
    /* アニメーション */
    @keyframes cornerPulse{0%,100%{opacity:.6;}50%{opacity:1;filter:drop-shadow(0 0 6px var(--water));}}
    @keyframes scanMove{0%{top:0;opacity:0;}5%{opacity:.75;}95%{opacity:.75;}100%{top:100%;opacity:0;}}
    @keyframes labelBlink{0%,100%{opacity:.55;}50%{opacity:.95;}}
    @keyframes summonBurst{0%{opacity:.9;transform:scale(.6);}40%{opacity:.7;}100%{opacity:0;transform:scale(2.2);}}
    @keyframes hexaFadeIn{from{opacity:0;transform:translate(-50%,-50%) scale(.7) rotate(-30deg);}to{opacity:.18;}}
    @keyframes hexaSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    @keyframes auraPulse{0%,100%{transform:scale(.97);opacity:.65;}50%{transform:scale(1.04);opacity:.9;}}
    @keyframes ringPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.55;}50%{transform:translate(-50%,-50%) scale(1.06);opacity:.85;}}
    @keyframes rippleWave{0%{transform:translateX(-50%) scale(.55);opacity:0;}14%{opacity:.5;}100%{transform:translateX(-50%) scale(1.22);opacity:0;}}
    @keyframes sparkFloat{0%{transform:translate3d(0,18px,0) scale(.55);opacity:0;}15%{opacity:.9;}85%{opacity:.55;}100%{transform:translate3d(0,-145px,0) scale(1.3);opacity:0;}}
    @keyframes driftFloat{0%{transform:translateY(0) scale(.8);opacity:0;}20%{opacity:.6;}80%{opacity:.35;}100%{transform:translateY(-180px) scale(1.2);opacity:0;}}
    @keyframes floatDrift{0%,100%{transform:scale(1) translateY(0);}30%{transform:scale(1.01) translateY(-6px);}60%{transform:scale(1.018) translateY(-12px);}}
    @keyframes breathe{0%,100%{filter:drop-shadow(0 0 10px rgba(94,207,255,.24)) drop-shadow(0 0 26px rgba(94,207,255,.18)) brightness(1.02) saturate(1.02);}50%{filter:drop-shadow(0 0 18px rgba(140,230,255,.42)) drop-shadow(0 0 38px rgba(94,207,255,.32)) brightness(1.07) saturate(1.06);}}
    @keyframes glowPulse{0%,100%{opacity:.45;}50%{opacity:.82;}}
    @keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  </style>
</head>
<body>
<div id="app">
  <video id="bgVideo" playsinline webkit-playsinline muted></video>

  <div id="guide">
    <div class="guide-box">
      <div class="scan-line"></div>
      <div class="guide-corner-br"></div>
      <div class="guide-corner-bl"></div>
    </div>
    <span class="guide-label">マーカーを枠内に合わせてください</span>
  </div>

  <svg id="hudTL" viewBox="0 0 60 60" fill="none">
    <path d="M0 20 L0 4 Q0 0 4 0 L20 0" stroke="#5ecfff" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#5ecfff" opacity=".5"/>
  </svg>
  <svg id="hudBR" viewBox="0 0 60 60" fill="none">
    <path d="M0 20 L0 4 Q0 0 4 0 L20 0" stroke="#5ecfff" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#5ecfff" opacity=".5"/>
  </svg>

  <div id="arStage">
    <div id="summonFlash"></div>
    <div id="hexagram">
      <svg viewBox="0 0 200 200" fill="none">
        <circle cx="100" cy="100" r="95" stroke="rgba(94,207,255,0.35)" stroke-width=".8" stroke-dasharray="4 6"/>
        <polygon points="100,10 120,50 160,50 130,75 145,118 100,92 55,118 70,75 40,50 80,50" fill="none" stroke="rgba(94,207,255,0.55)" stroke-width="1"/>
        <circle cx="100" cy="100" r="60" stroke="rgba(94,207,255,0.25)" stroke-width=".6" stroke-dasharray="2 4"/>
        <circle cx="100" cy="100" r="8" stroke="rgba(94,207,255,0.4)" stroke-width=".8"/>
        <circle cx="100" cy="10" r="3" fill="rgba(94,207,255,0.45)"/>
        <circle cx="100" cy="190" r="3" fill="rgba(94,207,255,0.45)"/>
        <circle cx="10" cy="100" r="3" fill="rgba(94,207,255,0.45)"/>
        <circle cx="190" cy="100" r="3" fill="rgba(94,207,255,0.45)"/>
      </svg>
    </div>
    <div id="auraLayer"></div>
    <div id="energyRings">
      <div class="ering"></div><div class="ering"></div>
      <div class="ering"></div><div class="ering"></div>
    </div>
    <div id="sparkleLayer">
      <div class="spark" style="left:14%;top:75%;animation-duration:5.1s;animation-delay:.1s"></div>
      <div class="spark" style="left:22%;top:80%;animation-duration:5.7s;animation-delay:.9s"></div>
      <div class="spark" style="left:33%;top:72%;animation-duration:4.8s;animation-delay:.4s"></div>
      <div class="spark" style="left:45%;top:82%;animation-duration:6.0s;animation-delay:1.3s"></div>
      <div class="spark" style="left:56%;top:76%;animation-duration:5.3s;animation-delay:.6s"></div>
      <div class="spark" style="left:67%;top:78%;animation-duration:4.9s;animation-delay:1.7s"></div>
      <div class="spark" style="left:78%;top:73%;animation-duration:5.5s;animation-delay:.2s"></div>
      <div class="spark" style="left:88%;top:79%;animation-duration:5.2s;animation-delay:1.1s"></div>
      <div class="spark" style="left:40%;top:65%;animation-duration:6.2s;animation-delay:2.1s"></div>
      <div class="spark" style="left:60%;top:68%;animation-duration:5.8s;animation-delay:.7s"></div>
      <div class="drift" style="left:28%;top:88%;animation-duration:7.5s;animation-delay:.3s"></div>
      <div class="drift" style="left:52%;top:90%;animation-duration:8.2s;animation-delay:2.5s"></div>
      <div class="drift" style="left:74%;top:86%;animation-duration:7.0s;animation-delay:1.2s"></div>
    </div>
    <div id="contentWrap">
      <img id="stepImg" alt="AR content">
    </div>
    <div id="glowVeil"></div>
    <div id="rippleLayer">
      <div class="ripple r1"></div>
      <div class="ripple r2"></div>
      <div class="ripple r3"></div>
    </div>
    <div id="stepDots">
      <div class="dot" data-i="0"></div>
      <div class="dot" data-i="1"></div>
      <div class="dot" data-i="2"></div>
      <div class="dot" data-i="3"></div>
    </div>
  </div>

  <div id="overlay">
    <div class="panel">
      <span class="panel-icon">🌊</span>
      <div class="panel-title">水龍神様 AR</div>
      <div class="panel-sub">マーカーをカメラで読み取ると<br>龍神様が現れます</div>
      <button id="startBtn" class="btn">AR を開始する</button>
      <button id="retryBtn" class="btn">再試行</button>
      <div id="errorText"></div>
    </div>
  </div>

  <canvas id="procCanvas" width="200" height="150"></canvas>
</div>
<script>
(()=>{
'use strict';
const STEP_IMAGES=['step1.png','step2.png','step3.png','step4.png'];
const STEP_DURATIONS=[4000,3500,3500,3500];
const FOUND_NEED=4,LOST_NEED=10,SCAN_W=200,SCAN_H=150;
const bgVideo=document.getElementById('bgVideo');
const stepImg=document.getElementById('stepImg');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');
const retryBtn=document.getElementById('retryBtn');
const errorText=document.getElementById('errorText');
const procCanvas=document.getElementById('procCanvas');
const procCtx=procCanvas.getContext('2d',{willReadFrequently:true});
const arStage=document.getElementById('arStage');
const guide=document.getElementById('guide');
const summonFlash=document.getElementById('summonFlash');
const dots=document.querySelectorAll('.dot');
let stream=null,started=false,isFound=false;
let foundCount=0,lostCount=0,stepIndex=0,stepTimer=null,frameCount=0;
function preloadImages(){STEP_IMAGES.forEach(s=>{const i=new Image();i.src=s;});}
function updateDots(i){dots.forEach((d,idx)=>d.classList.toggle('on',idx===i));}
function showStep(i){
  stepIndex=i;stepImg.classList.remove('visible');updateDots(i);
  setTimeout(()=>{stepImg.src=STEP_IMAGES[i];stepImg.classList.add('visible');},60);
}
function stopStepLoop(){if(stepTimer){clearTimeout(stepTimer);stepTimer=null;}}
function scheduleNext(){
  stopStepLoop();if(!isFound)return;
  stepTimer=setTimeout(()=>{
    if(!isFound)return;showStep((stepIndex+1)%STEP_IMAGES.length);scheduleNext();
  },STEP_DURATIONS[stepIndex]||3500);
}
function startStepLoop(){stopStepLoop();showStep(0);scheduleNext();}
function resetDisplay(){stopStepLoop();stepImg.classList.remove('visible');updateDots(0);}
function setARVisible(v){
  if(v){
    arStage.classList.add('active');guide.classList.add('guide-hidden');
    summonFlash.classList.remove('flash');void summonFlash.offsetWidth;summonFlash.classList.add('flash');
  }else{arStage.classList.remove('active');guide.classList.remove('guide-hidden');}
}
function onMarkerFound(){if(isFound)return;isFound=true;setARVisible(true);startStepLoop();}
function onMarkerLost(){if(!isFound)return;isFound=false;setARVisible(false);resetDisplay();}
async function startCamera(){
  startBtn.disabled=true;retryBtn.style.display='none';errorText.style.display='none';
  try{
    if(!navigator.mediaDevices?.getUserMedia)throw new Error('カメラAPIに対応していません。');
    const lists=[
      {video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false},
      {video:{facingMode:'environment'},audio:false},
      {video:true,audio:false}
    ];
    let lastErr=null;
    for(const c of lists){try{stream=await navigator.mediaDevices.getUserMedia(c);break;}catch(e){lastErr=e;}}
    if(!stream)throw lastErr||new Error('カメラを起動できませんでした。');
    bgVideo.srcObject=stream;bgVideo.setAttribute('playsinline','');bgVideo.setAttribute('webkit-playsinline','');bgVideo.muted=true;
    await bgVideo.play();
    overlay.classList.add('hidden');started=true;foundCount=0;lostCount=0;isFound=false;setARVisible(false);
  }catch(err){
    console.error(err);errorText.style.display='block';
    errorText.textContent='カメラを起動できませんでした。\n・Safari / Chrome で開いているか\n・GitHub Pages の URL で開いているか\n・カメラ権限を許可しているか\n\n詳細: '+(err?.message||err);
    retryBtn.style.display='inline-block';startBtn.disabled=false;
  }
}
function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}}
function analyzeWindow(data,sw,sh,rect){
  const x0=Math.max(0,Math.floor(rect.x)),y0=Math.max(0,Math.floor(rect.y));
  const rw=Math.min(sw-x0,Math.floor(rect.w)),rh=Math.min(sh-y0,Math.floor(rect.h));
  if(rw<20||rh<20)return null;
  const tx0=x0+Math.floor(rw*.18),ty0=y0+Math.floor(rh*.15);
  const trw=Math.floor(rw*.64),trh=Math.floor(rh*.60);
  const bth=Math.max(6,Math.floor(Math.min(rw,rh)*.10));
  let total=0,white=0,black=0,blue=0,textT=0,textD=0,borderT=0,borderB=0;
  for(let y=y0;y<y0+rh;y+=2){
    for(let x=x0;x<x0+rw;x+=2){
      const i=(y*sw+x)*4,r=data[i],g=data[i+1],b=data[i+2];
      const lum=.299*r+.587*g+.114*b;
      total++;
      if(lum>168)white++;if(lum<105)black++;if(b>90&&b>r+12&&b>g+8)blue++;
      const nb=(x<x0+bth)||(x>x0+rw-bth)||(y<y0+bth)||(y>y0+rh-bth);
      if(nb){borderT++;if(b>90&&b>r+12&&b>g+8)borderB++;}
      if(x>=tx0&&x<tx0+trw&&y>=ty0&&y<ty0+trh){textT++;if(lum<110)textD++;}
    }
  }
  if(!total||!textT||!borderT)return null;
  return{whiteRatio:white/total,blackRatio:black/total,blueRatio:blue/total,
         textDarkRatio:textD/textT,borderBlueRatio:borderB/borderT,areaRatio:(rw*rh)/(sw*sh)};
}
function scoreMarker(m){
  if(!m)return 0;let s=0;
  if(m.whiteRatio>.32&&m.whiteRatio<.92)s++;
  if(m.blackRatio>.025&&m.blackRatio<.34)s++;
  if(m.textDarkRatio>.035&&m.textDarkRatio<.48)s++;
  if(m.blueRatio>.003)s++;
  if(m.borderBlueRatio>.004)s++;
  if(m.areaRatio>.10&&m.areaRatio<.72)s++;
  return s;
}
function findBestMarker(data,sw,sh){
  const wins=[{x:sw*.10,y:sh*.08,w:sw*.80,h:sh*.80},{x:sw*.18,y:sh*.12,w:sw*.64,h:sh*.72},{x:sw*.24,y:sh*.16,w:sw*.52,h:sh*.62}];
  let best=null,bestScore=-1;
  for(const r of wins){const m=analyzeWindow(data,sw,sh,r);const s=scoreMarker(m);if(s>bestScore){bestScore=s;best=m;}}
  return{best,bestScore};
}
function detectLoop(){
  requestAnimationFrame(detectLoop);
  if(!started||!bgVideo.videoWidth)return;
  if(++frameCount%2!==0)return;
  try{
    procCtx.drawImage(bgVideo,0,0,SCAN_W,SCAN_H);
    const{data}=procCtx.getImageData(0,0,SCAN_W,SCAN_H);
    const{best,bestScore}=findBestMarker(data,SCAN_W,SCAN_H);
    const detected=!!best&&bestScore>=5;
    if(detected){foundCount++;lostCount=0;if(foundCount>=FOUND_NEED)onMarkerFound();}
    else{lostCount++;foundCount=0;if(lostCount>=LOST_NEED)onMarkerLost();}
  }catch(e){console.error(e);}
}
startBtn.addEventListener('click',startCamera);
retryBtn.addEventListener('click',startCamera);
window.addEventListener('beforeunload',stopCamera);
preloadImages();setARVisible(false);detectLoop();
})();
</script>
