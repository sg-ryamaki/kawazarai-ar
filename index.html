<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>kawazarai-ar</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; }

    /* HUD */
    #hud{
      position: fixed;
      top: env(safe-area-inset-top);
      left: env(safe-area-inset-left);
      right: env(safe-area-inset-right);
      padding: 14px 14px 10px;
      z-index: 9999;
      pointer-events:none;
    }
    #panel{
      display:inline-block;
      max-width: 92vw;
      color:#fff;
      background: rgba(0,0,0,.55);
      border-radius: 16px;
      padding: 14px 16px;
      backdrop-filter: blur(8px);
    }
    #title{ font-weight:700; font-size:18px; margin:0 0 8px; }
    #desc{ margin:0 0 10px; font-size:14px; line-height:1.5; opacity:.95; }
    #row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .pill{
      display:inline-block;
      padding:6px 12px;
      border-radius: 999px;
      font-weight:700;
      font-size:14px;
      letter-spacing:.02em;
    }
    #pillState{ background:#8a5a00; } /* WAIT */
    #pillShowing{ background:#0b6b3a; display:none; } /* SHOWING */
    #meta{ margin-top:8px; font-size:12px; opacity:.85; }

    /* Guide frame (大きくした) */
    #guideWrap{
      position: fixed;
      inset: 0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index: 9998;
      pointer-events:none;
    }
    #guide{
      /* ここがポイント：大きめに */
      width: min(78vw, 560px);
      aspect-ratio: 1 / 1;
      border: 4px dashed rgba(255,255,255,.70);
      border-radius: 22px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.25) inset; /* うっすら暗くして中央を目立たせる */
    }
    #guideHint{
      position:absolute;
      bottom: calc(env(safe-area-inset-bottom) + 18px);
      left: 50%;
      transform: translateX(-50%);
      color:#fff;
      background: rgba(0,0,0,.45);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      opacity: .92;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <!-- HUD -->
  <div id="hud">
    <div id="panel">
      <p id="title">手順：</p>
      <p id="desc">カメラ許可 → マーカーをガイド枠に入れてください</p>
      <div id="row">
        <span id="pillState" class="pill">WAIT</span>
        <span id="pillShowing" class="pill">表示中：<span id="showingNum">-</span></span>
      </div>
      <div id="meta">
        <span id="metaCam">camera: -</span> /
        <span id="metaPatt">patt: -</span>
      </div>
    </div>
  </div>

  <!-- Guide -->
  <div id="guideWrap">
    <div id="guide"></div>
    <div id="guideHint">※ マーカーをできるだけ大きく、ピントが合う距離で</div>
  </div>

  <!-- AR Scene -->
  <a-scene
    embedded
    renderer="antialias: true; alpha: true; precision: medium;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    arjs="
      trackingMethod: best;
      sourceType: webcam;
      debugUIEnabled: false;
      sourceWidth: 1280;
      sourceHeight: 720;
      displayWidth: 1280;
      displayHeight: 720;
    "
  >
    <!-- Pattern marker -->
    <a-marker
      id="marker"
      type="pattern"
      url="pattern-marker.patt"
      emitevents="true"
    >
      <!-- 画像表示用：同じ位置に重ねて opacity で切替 -->
      <a-entity position="0 0 0">
        <a-image id="img1" src="step1.png" position="0 0 0" rotation="-90 0 0" width="1.6" height="1.6" material="transparent:true; opacity:0;"></a-image>
        <a-image id="img2" src="step2.png" position="0 0 0" rotation="-90 0 0" width="1.6" height="1.6" material="transparent:true; opacity:0;"></a-image>
        <a-image id="img3" src="step3.png" position="0 0 0" rotation="-90 0 0" width="1.6" height="1.6" material="transparent:true; opacity:0;"></a-image>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // ---- 状態表示 ----
    const pillState = document.getElementById('pillState');
    const pillShowing = document.getElementById('pillShowing');
    const showingNum = document.getElementById('showingNum');
    const metaCam = document.getElementById('metaCam');
    const metaPatt = document.getElementById('metaPatt');

    const marker = document.getElementById('marker');
    const imgs = [
      document.getElementById('img1'),
      document.getElementById('img2'),
      document.getElementById('img3'),
    ];

    let timer = null;
    let index = 0;
    let found = false;

    function setOpacity(el, v) {
      el.setAttribute('material', 'opacity', v);
    }

    function fadeTo(nextIdx) {
      // ふわっと切替（フェード）
      imgs.forEach((img, i) => {
        img.removeAttribute('animation__fade');
        const target = (i === nextIdx) ? 1 : 0;
        img.setAttribute('animation__fade', {
          property: 'material.opacity',
          to: target,
          dur: 600,
          easing: 'easeInOutQuad'
        });
      });
    }

    function showStep(i) {
      index = i;
      showingNum.textContent = String(i + 1);
      pillShowing.style.display = 'inline-block';
      fadeTo(i);
    }

    function startLoop() {
      stopLoop();
      showStep(0);
      timer = setInterval(() => {
        if (!found) return;
        const next = (index + 1) % imgs.length;
        showStep(next);
      }, 3000);
    }

    function stopLoop() {
      if (timer) { clearInterval(timer); timer = null; }
    }

    // Marker events
    marker.addEventListener('markerFound', () => {
      found = true;
      pillState.textContent = 'FOUND';
      pillState.style.background = '#0b4f9a';
      startLoop();
    });

    marker.addEventListener('markerLost', () => {
      found = false;
      pillState.textContent = 'WAIT';
      pillState.style.background = '#8a5a00';
      pillShowing.style.display = 'none';
      stopLoop();
      // 全部消す
      imgs.forEach(img => setOpacity(img, 0));
    });

    // camera / patt の簡易表示（目安）
    // A-Frame の video 要素からサイズを拾う
    const check = setInterval(() => {
      const v = document.querySelector('video');
      if (v) {
        metaCam.textContent = `camera: OK (${v.videoWidth || '-'}x${v.videoHeight || '-'})`;
      }
    }, 600);

    // patt は読み込めている前提で表示だけ固定
    metaPatt.textContent = 'patt: OK (loading...)';
    // ざっくり 2秒後に OK 表示
    setTimeout(() => {
      metaPatt.textContent = 'patt: OK';
    }, 2000);
  </script>
</body>
</html>
