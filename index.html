<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>kawazarai-ar</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;
      font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif}
    #bgVideo{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
    #procCanvas{display:none}
    #stepImg{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      max-width:75vw;max-height:75vh;
      border-radius:14px;
      box-shadow:0 0 40px rgba(0,0,0,.8);
      z-index:5;opacity:0;
      transition:opacity 0.5s ease;
      pointer-events:none;
    }
    #stepImg.visible{opacity:1}
    #hud{
      position:fixed;
      top:env(safe-area-inset-top);
      left:env(safe-area-inset-left);
      right:env(safe-area-inset-right);
      padding:12px;z-index:10;pointer-events:none;color:#fff;
    }
    #panel{
      display:inline-block;max-width:92vw;
      background:rgba(0,0,0,.55);border-radius:14px;padding:12px 14px;
    }
    #panelTitle{font-weight:800;font-size:18px;margin-bottom:6px}
    #panelDesc{font-size:14px;line-height:1.5;opacity:.95;margin-bottom:8px}
    #pillRow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .pill{padding:6px 12px;border-radius:999px;font-weight:800;font-size:14px}
    #pillState{background:#8a5a00}
    #pillShowing{background:#0b6b3a;display:none}
    #metaRow{margin-top:6px;font-size:12px;opacity:.85}
    #guideWrap{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      z-index:9;pointer-events:none;
    }
    #guide{width:min(84vw,500px);aspect-ratio:1/1;border:4px dashed rgba(255,255,255,.75);border-radius:22px}
    #guideHint{
      position:fixed;left:50%;transform:translateX(-50%);
      bottom:calc(env(safe-area-inset-bottom) + 18px);
      z-index:9;color:#fff;background:rgba(0,0,0,.45);
      padding:8px 12px;border-radius:999px;font-size:12px;white-space:nowrap;pointer-events:none;
    }
    #startOverlay{
      position:fixed;inset:0;z-index:20;
      display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.85);color:#fff;padding:20px;
    }
    #startOverlay.hidden{display:none}
    #startCard{
      width:min(92vw,520px);background:rgba(20,20,20,.92);
      border:1px solid rgba(255,255,255,.18);
      border-radius:16px;padding:20px 18px;text-align:center;
    }
    #startCard h2{font-size:18px;margin-bottom:10px}
    #startCard p{font-size:13px;opacity:.9;line-height:1.7;margin-bottom:16px}
    #startBtn{
      appearance:none;border:none;padding:14px 32px;border-radius:12px;
      font-weight:900;font-size:17px;background:#0b4f9a;color:#fff;
      cursor:pointer;touch-action:manipulation;
    }
    #startBtn:disabled{background:#444}
    #startErr{margin-top:14px;font-size:12px;color:#ffb3b3;white-space:pre-wrap;text-align:left;display:none}
    #retryBtn{
      display:none;margin-top:10px;appearance:none;border:none;
      padding:10px 18px;border-radius:10px;font-weight:800;font-size:14px;
      background:#555;color:#fff;cursor:pointer;touch-action:manipulation;
    }
  </style>
</head>
<body>
<video id="bgVideo" playsinline webkit-playsinline muted autoplay></video>
<canvas id="procCanvas"></canvas>
<img id="stepImg" src="" alt=""/>

<div id="hud">
  <div id="panel">
    <div id="panelTitle">手順：</div>
    <div id="panelDesc">マーカーをガイド枠に入れてください</div>
    <div id="pillRow">
      <span id="pillState" class="pill">WAIT</span>
      <span id="pillShowing" class="pill">表示中：<span id="showingNum">-</span></span>
    </div>
    <div id="metaRow"><span id="metaCam">camera: -</span></div>
  </div>
</div>
<div id="guideWrap"><div id="guide"></div></div>
<div id="guideHint">※ マーカーをできるだけ大きく、ピントが合う距離で</div>

<div id="startOverlay">
  <div id="startCard">
    <h2>📷 ARを開始します</h2>
    <p>
      ボタンをタップしてカメラを起動してください。<br>
      「カメラへのアクセスを求めています」が出たら<br>
      <b>「許可」</b>を選択してください。<br><br>
      起動後、<b>龍のマーカー</b>をカメラに映してください。
    </p>
    <button id="startBtn">▶ START</button>
    <button id="retryBtn">🔄 リトライ</button>
    <div id="startErr"></div>
  </div>
</div>

// ── 検出パラメータ（緩め設定） ──
const SCAN_W     = 160;
const SCAN_H     = 120;
const MATCH_THR  = 55;   // ハミング距離許容値（256bit中 / 緩め）
const FOUND_NEED = 2;    // 連続N回で FOUND 確定
const LOST_NEED  = 12;   // 連続N回で LOST 確定

const bgVideo      = document.getElementById('bgVideo');
const procCanvas   = document.getElementById('procCanvas');
const stepImg      = document.getElementById('stepImg');
const startOverlay = document.getElementById('startOverlay');
const startBtn     = document.getElementById('startBtn');
const retryBtn     = document.getElementById('retryBtn');
const startErr     = document.getElementById('startErr');
const pillState    = document.getElementById('pillState');
const pillShowing  = document.getElementById('pillShowing');
const showingNum   = document.getElementById('showingNum');
const metaCam      = document.getElementById('metaCam');

let stepIndex = 0, stepTimer = null, isFound = false;
let foundCount = 0, lostCount = 0;
let procCtx = null;

function showStep(i){
  stepIndex = i;
  showingNum.textContent = String(i+1);
  pillShowing.style.display = 'inline-block';
  stepImg.classList.remove('visible');
  setTimeout(()=>{ stepImg.src = STEP_IMAGES[i]; stepImg.classList.add('visible'); }, 60);
}
function startStepLoop(){
  stopStepLoop(); showStep(0);
  stepTimer = setInterval(()=>{ if(isFound) showStep((stepIndex+1)%STEP_IMAGES.length); }, STEP_INTERVAL);
}
function stopStepLoop(){ if(stepTimer){ clearInterval(stepTimer); stepTimer=null; } }
function onMarkerFound(){
  if(isFound) return;
  isFound = true;
  pillState.textContent = 'FOUND'; pillState.style.background = '#0b4f9a';
  startStepLoop();
}
function onMarkerLost(){
  if(!isFound) return;
  isFound = false;
  pillState.textContent = 'WAIT'; pillState.style.background = '#8a5a00';
  pillShowing.style.display = 'none';
  stepImg.classList.remove('visible');
  stopStepLoop();
}

// ── パターン照合（ハミング距離・最小値を返す） ──
function matchPattern(sample){
  let minD = 256;
  for(const pat of MARKER_PATTERNS){
    let d = 0;
    for(let i=0; i<256; i++) if(sample[i]!==pat[i]) d++;
    if(d < minD) minD = d;
  }
  return minD;
}

// ── 適応的閾値で2値化（明暗変化に強い） ──
function adaptiveBinarize(gray, w, h){
  const bin = new Uint8Array(w*h);
  // 画像全体の平均輝度を計算
  let sum = 0;
  for(let i=0; i<gray.length; i++) sum += gray[i];
  const mean = sum / gray.length;
  // 平均より暗い = 黒(0)、明るい = 白(255)
  const thr = mean * 0.85; // 平均の85%を閾値に
  for(let i=0; i<gray.length; i++) bin[i] = gray[i] < thr ? 0 : 255;
  return bin;
}

// ── メイン検出ループ ──
function detectMarker(){
  requestAnimationFrame(detectMarker);

  procCtx.drawImage(bgVideo, 0, 0, SCAN_W, SCAN_H);
  const data = procCtx.getImageData(0, 0, SCAN_W, SCAN_H).data;

  // グレースケール変換
  const gray = new Uint8Array(SCAN_W * SCAN_H);
  for(let i=0; i<gray.length; i++){
    gray[i] = (0.299*data[i*4] + 0.587*data[i*4+1] + 0.114*data[i*4+2]) | 0;
  }

  // 適応的2値化
  const bin = adaptiveBinarize(gray, SCAN_W, SCAN_H);

  let markerDetected = false;

  // ガイド枠の中央付近を重点的にスキャン
  const cx = SCAN_W / 2, cy = SCAN_H / 2;
  const searchRadiusX = SCAN_W * 0.45;
  const searchRadiusY = SCAN_H * 0.45;

  const STEP = 3;
  outer:
  for(let ty = Math.floor(cy - searchRadiusY); ty < cy + searchRadiusY; ty += STEP){
    for(let tx = Math.floor(cx - searchRadiusX); tx < cx + searchRadiusX; tx += STEP){
      if(ty<0||ty>=SCAN_H||tx<0||tx>=SCAN_W) continue;

      // 黒ピクセルからスタート
      if(bin[ty*SCAN_W+tx] !== 0) continue;

      // 右方向の黒の幅を計測
      let bw = 0;
      for(let x=tx; x<Math.min(tx+80,SCAN_W) && bin[ty*SCAN_W+x]===0; x++) bw++;
      if(bw < 10 || bw > 90) continue;

      // 下方向の黒の高さを計測
      let bh = 0;
      for(let y=ty; y<Math.min(ty+80,SCAN_H) && bin[y*SCAN_W+tx]===0; y++) bh++;
      if(bh < 10 || bh > 90) continue;

      // 縦横比チェック（正方形に近いもの）
      const aspect = bw / bh;
      if(aspect < 0.35 || aspect > 2.8) continue;

      const sz = Math.min(bw, bh);
      if(sz < 12) continue;

      // 内側をサンプリング
      const borderPx = Math.max(2, Math.floor(sz * 0.12));
      const ix = tx + borderPx, iy = ty + borderPx;
      const iw = sz - borderPx*2, ih = sz - borderPx*2;
      if(iw < 8 || ih < 8) continue;

      // 16×16 サンプリング
      const sample = new Array(256);
      for(let sy=0; sy<16; sy++){
        for(let sx=0; sx<16; sx++){
          const px = ix + Math.floor(sx*iw/16);
          const py = iy + Math.floor(sy*ih/16);
          if(px>=SCAN_W||py>=SCAN_H){ sample[sy*16+sx]=0; continue; }
          sample[sy*16+sx] = bin[py*SCAN_W+px]===0 ? 1 : 0;
        }
      }

      // 黒ピクセル数の足切り
      const bc = sample.reduce((a,b)=>a+b,0);
      if(bc < 8 || bc > 220) continue;

      // パターン照合
      const dist = matchPattern(sample);
      if(dist <= MATCH_THR){
        markerDetected = true;
        break outer;
      }
    }
  }

  // チラつき防止
  if(markerDetected){
    foundCount++; lostCount = 0;
    if(foundCount >= FOUND_NEED) onMarkerFound();
  } else {
    lostCount++; foundCount = 0;
    if(lostCount >= LOST_NEED) onMarkerLost();
  }
}

// ── 起動処理 ──
async function startAR(stream){
  bgVideo.srcObject = stream;
  bgVideo.muted = true;
  await bgVideo.play();
  await new Promise(r=>{ if(bgVideo.videoWidth){r();return;} bgVideo.addEventListener('loadedmetadata',r,{once:true}); });
  metaCam.textContent = `camera: OK (${bgVideo.videoWidth}x${bgVideo.videoHeight})`;
  procCanvas.width = SCAN_W; procCanvas.height = SCAN_H;
  procCtx = procCanvas.getContext('2d',{willReadFrequently:true});
  detectMarker();
}

startBtn.addEventListener('click', async ()=>{
  startErr.style.display='none'; retryBtn.style.display='none';
  startBtn.disabled=true; startBtn.textContent='起動中…';
  try{
    let stream;
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false
      });
    }catch(_){
      stream = await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    }
    await startAR(stream);
    startOverlay.classList.add('hidden');
  }catch(e){
    startBtn.disabled=false; startBtn.textContent='▶ START';
    retryBtn.style.display='inline-block'; startErr.style.display='block';
    const msgs={
      NotAllowedError:'カメラの使用が拒否されました。\n「設定」→「Safari」→「カメラ」を「許可」にして再読み込みしてください。',
      NotFoundError:'カメラが見つかりません。他のアプリがカメラを占有していないか確認してください。',
      NotReadableError:'カメラにアクセスできません。Safariを完全に終了して再度お試しください。',
    };
    startErr.textContent = msgs[e.name]||('エラー: '+(e.message||String(e)));
  }
});

retryBtn.addEventListener('click',()=>location.reload());

})();
</script>
