<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Water Dragon AR</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      background: #000;
    }

    #bgVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #stepImg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity .25s ease;
      pointer-events: none;
      z-index: 20;
    }

    #stepImg.visible {
      opacity: 1;
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.45), rgba(0,0,0,.65));
      padding: 24px;
      box-sizing: border-box;
    }

    #overlay.hidden {
      display: none;
    }

    .panel {
      width: min(92vw, 520px);
      border-radius: 18px;
      background: rgba(17,17,17,.88);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
      color: #fff;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .panel h1 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.3;
    }

    .panel p {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,.88);
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 14px;
      background: #0b4f9a;
      color: #fff;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: .6;
      cursor: default;
    }

    #retryBtn {
      margin-top: 12px;
      background: #555;
      display: none;
    }

    #errorText {
      margin-top: 14px;
      white-space: pre-wrap;
      text-align: left;
      font-size: 13px;
      line-height: 1.6;
      color: #ffd2d2;
      display: none;
    }

    #statusBar {
      position: absolute;
      left: 12px;
      right: 12px;
      top: env(safe-area-inset-top, 0);
      top: max(12px, env(safe-area-inset-top));
      z-index: 50;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: #fff;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(6px);
    }

    #statePill.wait {
      background: rgba(138,90,0,.82);
    }

    #statePill.found {
      background: rgba(11,79,154,.88);
    }

    #guide {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .guide-box {
      width: min(72vw, 72vh, 360px);
      aspect-ratio: 1 / 1;
      border: 3px solid rgba(255,255,255,.85);
      border-radius: 18px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.18);
      position: relative;
    }

    .guide-box::before,
    .guide-box::after {
      content: "";
      position: absolute;
      inset: 12px;
      border: 2px dashed rgba(255,255,255,.28);
      border-radius: 12px;
    }

    #debug {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 55;
      background: rgba(0,0,0,.48);
      color: #d7ecff;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.55;
      backdrop-filter: blur(6px);
      white-space: pre-wrap;
    }

    #procCanvas {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="bgVideo" playsinline webkit-playsinline muted></video>
    <img id="stepImg" alt="AR step content">

    <div id="guide">
      <div class="guide-box"></div>
    </div>

    <div id="statusBar">
      <div id="statePill" class="pill wait">WAIT</div>
      <div id="showPill" class="pill" style="display:none;">STEP <span id="showNum">1</span></div>
    </div>

    <div id="overlay">
      <div class="panel">
        <h1>ARを開始します</h1>
        <p>
          カメラ権限を許可して、<br>
          マーカー画像「①.png」を枠の中に入れてください。<br>
          認識後、Step1→Step2→Step3→Step4 をループ表示します。
        </p>
        <button id="startBtn" class="btn">START</button>
        <button id="retryBtn" class="btn">再試行</button>
        <div id="errorText"></div>
      </div>
    </div>

    <div id="debug">初期化待機中...</div>
    <canvas id="procCanvas" width="160" height="120"></canvas>
  </div>

  <script>
    (() => {
      'use strict';

      const STEP_IMAGES = ['step1.png', 'step2.png', 'step3.png', 'step4.png'];
      const STEP_DURATIONS = [4000, 3000, 3000, 3000];

      const bgVideo = document.getElementById('bgVideo');
      const stepImg = document.getElementById('stepImg');
      const overlay = document.getElementById('overlay');
      const startBtn = document.getElementById('startBtn');
      const retryBtn = document.getElementById('retryBtn');
      const errorText = document.getElementById('errorText');
      const debug = document.getElementById('debug');
      const procCanvas = document.getElementById('procCanvas');
      const procCtx = procCanvas.getContext('2d', { willReadFrequently: true });
      const statePill = document.getElementById('statePill');
      const showPill = document.getElementById('showPill');
      const showNum = document.getElementById('showNum');

      const SCAN_W = 160;
      const SCAN_H = 120;

      let stream = null;
      let stepIndex = 0;
      let stepTimer = null;
      let isFound = false;
      let started = false;

      function setDebug(msg) {
        debug.textContent = msg;
        console.log(msg);
      }

      function setState(found) {
        isFound = found;
        if (found) {
          statePill.textContent = 'FOUND';
          statePill.classList.remove('wait');
          statePill.classList.add('found');
        } else {
          statePill.textContent = 'WAIT';
          statePill.classList.remove('found');
          statePill.classList.add('wait');
        }
      }

      function preloadImages() {
        STEP_IMAGES.forEach(src => {
          const img = new Image();
          img.src = src;
        });
      }

      function showStep(i) {
        stepIndex = i;
        showNum.textContent = String(i + 1);
        showPill.style.display = 'inline-flex';

        stepImg.classList.remove('visible');
        setTimeout(() => {
          stepImg.src = STEP_IMAGES[i];
          stepImg.classList.add('visible');
        }, 50);
      }

      function stopStepLoop() {
        if (stepTimer) {
          clearTimeout(stepTimer);
          stepTimer = null;
        }
      }

      function scheduleNextStep() {
        stopStepLoop();
        if (!isFound) return;

        const duration = STEP_DURATIONS[stepIndex] || 3000;
        stepTimer = setTimeout(() => {
          if (!isFound) return;
          const next = (stepIndex + 1) % STEP_IMAGES.length;
          showStep(next);
          scheduleNextStep();
        }, duration);
      }

      function startStepLoop() {
        stopStepLoop();
        showStep(0);
        scheduleNextStep();
      }

      function resetDisplay() {
        stopStepLoop();
        stepImg.classList.remove('visible');
        showPill.style.display = 'none';
      }

      function onMarkerFound() {
        if (isFound) return;
        setState(true);
        setDebug('マーカー認識: FOUND');
        startStepLoop();
      }

      function onMarkerLost() {
        if (!isFound) return;
        setState(false);
        setDebug('マーカー未認識: WAIT');
        resetDisplay();
      }

      async function startCamera() {
        startBtn.disabled = true;
        retryBtn.style.display = 'none';
        errorText.style.display = 'none';
        errorText.textContent = '';

        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error('このブラウザはカメラAPIに十分対応していません。');
          }

          const constraintsList = [
            {
              video: {
                facingMode: { ideal: 'environment' },
                width: { ideal: 1280 },
                height: { ideal: 720 }
              },
              audio: false
            },
            {
              video: {
                facingMode: 'environment'
              },
              audio: false
            },
            {
              video: true,
              audio: false
            }
          ];

          let lastError = null;

          for (const constraints of constraintsList) {
            try {
              stream = await navigator.mediaDevices.getUserMedia(constraints);
              break;
            } catch (err) {
              lastError = err;
            }
          }

          if (!stream) {
            throw lastError || new Error('カメラを起動できませんでした。');
          }

          bgVideo.srcObject = stream;
          bgVideo.setAttribute('playsinline', '');
          bgVideo.setAttribute('webkit-playsinline', '');
          bgVideo.muted = true;
          await bgVideo.play();

          overlay.classList.add('hidden');
          started = true;
          setDebug('カメラ起動完了。マーカー待機中...');
          setState(false);
        } catch (err) {
          console.error(err);
          errorText.style.display = 'block';
          errorText.textContent =
            'カメラを起動できませんでした。\n' +
            '・Safari / Chrome で開いているか\n' +
            '・GitHub Pages の URL で開いているか\n' +
            '・カメラ権限を許可しているか\n\n' +
            '詳細: ' + (err && err.message ? err.message : err);
          retryBtn.style.display = 'inline-block';
          startBtn.disabled = false;
          setDebug('カメラ起動失敗');
        }
      }

      function stopCamera() {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }
      }

      function calcFrameFeature() {
        if (!bgVideo.videoWidth || !bgVideo.videoHeight) return null;

        procCtx.drawImage(bgVideo, 0, 0, SCAN_W, SCAN_H);
        const img = procCtx.getImageData(0, 0, SCAN_W, SCAN_H);
        const data = img.data;

        let darkCount = 0;
        let total = 0;

        for (let y = 0; y < SCAN_H; y += 2) {
          for (let x = 0; x < SCAN_W; x += 2) {
            const i = (y * SCAN_W + x) * 4;
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const lum = 0.299 * r + 0.587 * g + 0.114 * b;
            total++;
            if (lum < 115) darkCount++;
          }
        }

        const darkRatio = total > 0 ? darkCount / total : 0;
        return { darkRatio };
      }

      function detectLoop() {
        requestAnimationFrame(detectLoop);

        if (!started) return;
        if (!bgVideo.videoWidth) return;

        try {
          const result = calcFrameFeature();
          if (!result) return;

          const darkRatio = result.darkRatio;

          setDebug(
            'カメラ起動完了\n' +
            '暗部比率: ' + darkRatio.toFixed(3) + '\n' +
            '目安: 0.12〜0.55 付近で認識しやすいです\n' +
            '現在状態: ' + (isFound ? 'FOUND' : 'WAIT')
          );

          if (darkRatio > 0.12 && darkRatio < 0.55) {
            onMarkerFound();
          } else {
            onMarkerLost();
          }
        } catch (err) {
          console.error(err);
          setDebug('検出処理エラー: ' + err.message);
        }
      }

      startBtn.addEventListener('click', startCamera);
      retryBtn.addEventListener('click', startCamera);
      window.addEventListener('beforeunload', stopCamera);

      preloadImages();
      setDebug('開始画面表示OK。START を押してください。');
      detectLoop();
    })();
  </script>
</body>
</html>
