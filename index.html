<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>kawazarai-ar</title>

  <!-- ★ 1.2.5 → 1.2.2 に変更（iOS Safari 実績版） -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    }
    a-scene { position: fixed !important; inset: 0 !important; }
    canvas  { width: 100vw !important; height: 100vh !important; }

    #hud {
      position: fixed;
      top: env(safe-area-inset-top);
      left: env(safe-area-inset-left);
      right: env(safe-area-inset-right);
      padding: 12px; z-index: 10;
      pointer-events: none; color: #fff;
    }
    #panel {
      display: inline-block; max-width: 92vw;
      background: rgba(0,0,0,.55);
      border-radius: 14px; padding: 12px 14px;
    }
    #title { margin: 0 0 6px; font-weight: 800; font-size: 18px; }
    #desc  { margin: 0 0 8px; font-size: 14px; line-height: 1.5; opacity: .95; }
    #row   { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .pill  { padding: 6px 12px; border-radius: 999px; font-weight: 800; font-size: 14px; }
    #pillState   { background: #8a5a00; }
    #pillShowing { background: #0b6b3a; display: none; }
    #meta { margin-top: 6px; font-size: 12px; opacity: .85; }

    #guideWrap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 9; pointer-events: none;
    }
    #guide {
      width: min(84vw, 640px); aspect-ratio: 1/1;
      border: 4px dashed rgba(255,255,255,.75); border-radius: 22px;
    }
    #guideHint {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(env(safe-area-inset-bottom) + 18px);
      z-index: 9; color: #fff; background: rgba(0,0,0,.45);
      padding: 8px 12px; border-radius: 999px;
      font-size: 12px; white-space: nowrap; pointer-events: none;
    }

    #startOverlay {
      position: fixed; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.85); color: #fff; padding: 20px;
      transition: opacity 0.4s;
    }
    #startOverlay.hidden { opacity: 0; pointer-events: none; }
    #startCard {
      width: min(92vw, 520px);
      background: rgba(20,20,20,.92);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 16px; padding: 20px 18px; text-align: center;
    }
    #startCard h2 { margin: 0 0 10px; font-size: 18px; }
    #startCard p  { margin: 0 0 14px; font-size: 13px; opacity: .9; line-height: 1.6; }
    #status {
      margin: 0 0 16px;
      font-size: 13px;
      color: #adf;
      min-height: 20px;
    }
    #startBtn {
      pointer-events: auto; appearance: none; border: none;
      padding: 14px 28px; border-radius: 12px;
      font-weight: 900; font-size: 17px;
      background: #0b4f9a; color: #fff;
      cursor: pointer; touch-action: manipulation;
    }
    #startBtn:disabled { background: #444; }
    #startErr {
      margin-top: 14px; font-size: 12px; color: #ffb3b3;
      white-space: pre-wrap; text-align: left; display: none;
    }
    #retryBtn {
      display: none; margin-top: 10px;
      pointer-events: auto; appearance: none; border: none;
      padding: 10px 18px; border-radius: 10px;
      font-weight: 800; font-size: 14px;
      background: #555; color: #fff;
      cursor: pointer; touch-action: manipulation;
    }
  </style>
</head>
<body>

  <div id="hud">
    <div id="panel">
      <p id="title">手順：</p>
      <p id="desc">龍の画像全体をガイド枠に入れてください</p>
      <div id="row">
        <span id="pillState"   class="pill">WAIT</span>
        <span id="pillShowing" class="pill">表示中：<span id="showingNum">-</span></span>
      </div>
      <div id="meta"><span id="metaState">起動待ち</span></div>
    </div>
  </div>

  <div id="guideWrap"><div id="guide"></div></div>
  <div id="guideHint">※ 龍の画像全体がガイド枠に収まるように</div>

  <a-scene
    id="arScene"
    mindar-image="imageTargetSrc: targets.mind; uiLoading: no; uiScanning: no; uiError: no;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <img id="asset1" src="step1.png" crossorigin="anonymous" />
      <img id="asset2" src="step2.png" crossorigin="anonymous" />
      <img id="asset3" src="step3.png" crossorigin="anonymous" />
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-image id="img1" src="#asset1" position="0 0 0" width="1" height="1"
               material="transparent:true; opacity:0;"></a-image>
      <a-image id="img2" src="#asset2" position="0 0 0" width="1" height="1"
               material="transparent:true; opacity:0;"></a-image>
      <a-image id="img3" src="#asset3" position="0 0 0" width="1" height="1"
               material="transparent:true; opacity:0;"></a-image>
    </a-entity>
  </a-scene>

  <div id="startOverlay">
    <div id="startCard">
      <h2>📷 ARを開始します</h2>
      <p>
        下のボタンをタップしてカメラを起動してください。<br>
        「カメラへのアクセスを求めています」が出たら<br>
        <b>「許可」</b>を選択してください。<br><br>
        起動後、<b>龍の画像全体</b>をカメラに映してください。
      </p>
      <div id="status">AR初期化中… しばらくお待ちください</div>
      <button id="startBtn" disabled>準備中…</button>
      <button id="retryBtn">🔄 リトライ</button>
      <div id="startErr"></div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const startOverlay = document.getElementById('startOverlay');
    const startBtn     = document.getElementById('startBtn');
    const retryBtn     = document.getElementById('retryBtn');
    const startErr     = document.getElementById('startErr');
    const statusEl     = document.getElementById('status');
    const pillState    = document.getElementById('pillState');
    const pillShowing  = document.getElementById('pillShowing');
    const showingNum   = document.getElementById('showingNum');
    const metaState    = document.getElementById('metaState');
    const arScene      = document.getElementById('arScene');
    const imgs         = ['img1','img2','img3'].map(id => document.getElementById(id));

    let timer = null, stepIdx = 0, found = false;

    /* ── ステップ表示 ── */
    function fadeTo(nextIdx) {
      imgs.forEach((img, i) => {
        img.removeAttribute('animation__fade');
        img.setAttribute('animation__fade', {
          property: 'material.opacity',
          to: (i === nextIdx) ? 1 : 0,
          dur: 650, easing: 'easeInOutQuad'
        });
      });
    }
    function showStep(i) {
      stepIdx = i;
      showingNum.textContent = String(i + 1);
      pillShowing.style.display = 'inline-block';
      fadeTo(i);
    }
    function startLoop() {
      stopLoop(); showStep(0);
      timer = setInterval(() => { if (found) showStep((stepIdx + 1) % imgs.length); }, 3000);
    }
    function stopLoop() { if (timer) { clearInterval(timer); timer = null; } }

    /* ── ターゲット検出イベント ── */
    function setupTargetEvents() {
      const target = document.querySelector('[mindar-image-target]');
      if (!target) return;
      target.addEventListener('targetFound', () => {
        found = true;
        pillState.textContent = 'FOUND';
        pillState.style.background = '#0b4f9a';
        metaState.textContent = '検出中';
        startLoop();
      });
      target.addEventListener('targetLost', () => {
        found = false;
        pillState.textContent = 'WAIT';
        pillState.style.background = '#8a5a00';
        pillShowing.style.display = 'none';
        metaState.textContent = '龍の画像を探しています…';
        stopLoop();
        imgs.forEach(img => img.setAttribute('material', 'opacity', 0));
      });
    }

    /* ── a-scene の loaded を待ってから START を有効化 ── */
    function waitForSceneLoaded() {
      return new Promise((resolve, reject) => {
        // タイムアウト 30 秒
        const timeout = setTimeout(() => {
          reject(new Error(
            'AR初期化がタイムアウトしました（30秒）。\n\n' +
            '【targets.mind を再生成してください】\n' +
            '1. https://hiukim.github.io/mind-ar-js-doc/tools/compile を開く\n' +
            '2. 龍の画像を「500px以下」にリサイズしてからアップロード\n' +
            '3. Export → targets.mind を再ダウンロード\n' +
            '4. GitHubに上書きアップロードして再試行'
          ));
        }, 30000);

        if (arScene.hasLoaded) {
          clearTimeout(timeout);
          resolve();
        } else {
          arScene.addEventListener('loaded', () => {
            clearTimeout(timeout);
            resolve();
          }, { once: true });
        }
      });
    }

    /* ── MindAR video にストリームを注入 ── */
    async function injectStream(stream) {
      // MindAR 1.2.2 は .mindar-video クラスの video を生成する
      let v = document.querySelector('.mindar-video') || document.querySelector('video');
      if (!v) {
        // 最大3秒待つ
        for (let i = 0; i < 30; i++) {
          await new Promise(r => setTimeout(r, 100));
          v = document.querySelector('.mindar-video') || document.querySelector('video');
          if (v) break;
        }
      }
      if (!v) throw new Error('video要素が見つかりません。targets.mind の再生成をお試しください。');

      v.setAttribute('playsinline', '');
      v.setAttribute('webkit-playsinline', '');
      v.muted = true;
      v.srcObject = stream;
      await v.play();
      return v;
    }

    /* ── 初期化フロー ── */
    async function init() {
      statusEl.textContent = 'AR初期化中… (targets.mind 読み込み中)';
      try {
        await waitForSceneLoaded();
        statusEl.textContent = '準備完了 — STARTを押してください';
        startBtn.disabled    = false;
        startBtn.textContent = '▶ START';
        setupTargetEvents();
      } catch (e) {
        statusEl.textContent = '';
        startErr.style.display = 'block';
        startErr.textContent   = e.message;
        retryBtn.style.display = 'inline-block';
      }
    }

    /* ── STARTボタン ── */
    startBtn.addEventListener('click', async () => {
      startErr.style.display = 'none';
      retryBtn.style.display = 'none';
      startBtn.disabled      = true;
      startBtn.textContent   = '起動中…';
      statusEl.textContent   = 'カメラ起動中…';

      try {
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
          });
        } catch (_) {
          stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        }

        await injectStream(stream);

        startOverlay.classList.add('hidden');
        metaState.textContent = '龍の画像を探しています…';

      } catch (e) {
        startBtn.disabled    = false;
        startBtn.textContent = '▶ START';
        statusEl.textContent = '';
        retryBtn.style.display = 'inline-block';
        startErr.style.display = 'block';
        const msgs = {
          NotAllowedError:  'カメラの使用が拒否されました。\n「設定」→「Safari」→「カメラ」を「許可」にして再読み込みしてください。',
          NotFoundError:    'カメラが見つかりません。他のアプリがカメラを使用していないか確認してください。',
          NotReadableError: 'カメラにアクセスできません。Safariを完全に終了して再度お試しください。',
        };
        startErr.textContent = msgs[e.name] || ('エラー: ' + (e.message || String(e)));
      }
    });

    retryBtn.addEventListener('click', () => {
      location.reload();
    });

    /* ── 起動 ── */
    init();

  })();
  </script>
</body>
</html>
