<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>kawazarai-ar</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    }

    /* A-Frame canvas を確実にフルスクリーン化 */
    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 0;
    }
    canvas { width: 100vw !important; height: 100vh !important; }

    /* HUD（ぼかし無し＝黒画面回避） */
    #hud {
      position: fixed;
      top: env(safe-area-inset-top);
      left: env(safe-area-inset-left);
      right: env(safe-area-inset-right);
      padding: 12px 12px 10px;
      z-index: 10;
      pointer-events: none;
    }
    #panel {
      display: inline-block;
      max-width: 92vw;
      color: #fff;
      background: rgba(0,0,0,.55);
      border-radius: 14px;
      padding: 12px 14px;
    }
    #title { margin: 0 0 6px; font-weight: 800; font-size: 18px; }
    #desc  { margin: 0 0 8px; font-size: 14px; line-height: 1.5; opacity: .95; }
    #row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .pill { padding: 6px 12px; border-radius: 999px; font-weight: 800; font-size: 14px; }
    #pillState { background: #8a5a00; } /* WAIT */
    #pillShowing { background: #0b6b3a; display: none; } /* 表示中 */
    #meta { margin-top: 6px; font-size: 12px; opacity: .85; }

    /* ガイド枠（シンプル：影・ぼかし無し） */
    #guideWrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9;
      pointer-events: none;
    }
    #guide {
      width: min(84vw, 640px);
      aspect-ratio: 1 / 1;
      border: 4px dashed rgba(255,255,255,.75);
      border-radius: 22px;
    }
    #guideHint {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(env(safe-area-inset-bottom) + 18px);
      z-index: 9;
      color: #fff;
      background: rgba(0,0,0,.45);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      pointer-events: none;
    }

    /* デバッグ用：小さな映像プレビュー（必要時だけ表示） */
    #preview {
      position: fixed;
      right: 10px;
      bottom: calc(env(safe-area-inset-bottom) + 10px);
      width: 120px;
      height: 160px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 10px;
      overflow: hidden;
      z-index: 11;
      display: none;
    }
    #preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* 自撮り反転っぽくなる場合があるので好みで */
    }
  </style>
</head>

<body>
  <!-- HUD -->
  <div id="hud">
    <div id="panel">
      <p id="title">手順：</p>
      <p id="desc">カメラ許可 → マーカーをガイド枠に入れてください</p>
      <div id="row">
        <span id="pillState" class="pill">WAIT</span>
        <span id="pillShowing" class="pill">表示中：<span id="showingNum">-</span></span>
      </div>
      <div id="meta">
        <span id="metaCam">camera: -</span> /
        <span id="metaPatt">patt: -</span>
      </div>
    </div>
  </div>

  <!-- Guide -->
  <div id="guideWrap">
    <div id="guide"></div>
  </div>
  <div id="guideHint">※ マーカーをできるだけ大きく、ピントが合う距離で</div>

  <!-- Debug preview -->
  <div id="preview"><video id="pv" muted playsinline></video></div>

  <!-- AR Scene -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="antialias: true; alpha: false; precision: medium;"
    arjs="
      trackingMethod: best;
      sourceType: webcam;
      debugUIEnabled: false;
      sourceWidth: 1280;
      sourceHeight: 720;
      displayWidth: 1280;
      displayHeight: 720;
    "
  >
    <a-marker
      id="marker"
      type="pattern"
      url="pattern-marker.patt"
      emitevents="true"
    >
      <a-entity position="0 0 0">
        <a-image id="img1" src="step1.png" position="0 0 0" rotation="-90 0 0" width="1.7" height="1.7"
                 material="transparent:true; opacity:0;"></a-image>
        <a-image id="img2" src="step2.png" position="0 0 0" rotation="-90 0 0" width="1.7" height="1.7"
                 material="transparent:true; opacity:0;"></a-image>
        <a-image id="img3" src="step3.png" position="0 0 0" rotation="-90 0 0" width="1.7" height="1.7"
                 material="transparent:true; opacity:0;"></a-image>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // ---- UI ----
    const pillState   = document.getElementById('pillState');
    const pillShowing = document.getElementById('pillShowing');
    const showingNum  = document.getElementById('showingNum');
    const metaCam     = document.getElementById('metaCam');
    const metaPatt    = document.getElementById('metaPatt');

    const marker = document.getElementById('marker');
    const imgs = [
      document.getElementById('img1'),
      document.getElementById('img2'),
      document.getElementById('img3')
    ];

    // ---- 切替 ----
    let timer = null;
    let index = 0;
    let found = false;

    function fadeTo(nextIdx) {
      imgs.forEach((img, i) => {
        img.removeAttribute('animation__fade');
        const target = (i === nextIdx) ? 1 : 0;
        img.setAttribute('animation__fade', {
          property: 'material.opacity',
          to: target,
          dur: 650,
          easing: 'easeInOutQuad'
        });
      });
    }

    function showStep(i) {
      index = i;
      showingNum.textContent = String(i + 1);
      pillShowing.style.display = 'inline-block';
      fadeTo(i);
    }

    function startLoop() {
      stopLoop();
      showStep(0);
      timer = setInterval(() => {
        if (!found) return;
        showStep((index + 1) % imgs.length);
      }, 3000);
    }

    function stopLoop() {
      if (timer) { clearInterval(timer); timer = null; }
    }

    marker.addEventListener('markerFound', () => {
      found = true;
      pillState.textContent = 'FOUND';
      pillState.style.background = '#0b4f9a';
      startLoop();
    });

    marker.addEventListener('markerLost', () => {
      found = false;
      pillState.textContent = 'WAIT';
      pillState.style.background = '#8a5a00';
      pillShowing.style.display = 'none';
      stopLoop();
      imgs.forEach(img => img.setAttribute('material', 'opacity', 0));
    });

    // ---- iPhone黒画面対策：videoに playsinline/muted を付与して再生を試す ----
    const previewBox = document.getElementById('preview');
    const pv = document.getElementById('pv');

    function attachVideoFix() {
      const v = document.querySelector('video');
      if (!v) return false;

      // iOS Safariで重要
      v.setAttribute('playsinline', '');
      v.setAttribute('webkit-playsinline', '');
      v.muted = true;
      v.autoplay = true;

      // 映像が黒いときの切り分け用プレビュー（常時は不要。必要なら true に）
      const SHOW_PREVIEW = false;
      if (SHOW_PREVIEW) {
        previewBox.style.display = 'block';
        pv.srcObject = v.srcObject || null;
        pv.play().catch(()=>{});
      }

      // 再生を明示
      v.play().catch(()=>{});
      return true;
    }

    // camera表示（videoサイズ）+ fix適用
    let fixed = false;
    setInterval(() => {
      const v = document.querySelector('video');
      if (v) {
        metaCam.textContent = `camera: OK (${v.videoWidth || '-'}x${v.videoHeight || '-'})`;
        if (!fixed) fixed = attachVideoFix();
      }
    }, 500);

    // patt表示（簡易）
    metaPatt.textContent = 'patt: OK';
  </script>
</body>
</html>
