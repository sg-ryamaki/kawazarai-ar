<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>kawazarai-ar [DEBUG]</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; background:#111; color:#fff;
      font-family: system-ui, monospace; font-size: 13px; }
    #log {
      position: fixed; top: 0; left: 0; right: 0; bottom: 120px;
      overflow-y: auto; padding: 10px;
      background: rgba(0,0,0,0.85);
      z-index: 30;
      white-space: pre-wrap; word-break: break-all;
    }
    .ok   { color: #6f6; }
    .warn { color: #ff6; }
    .err  { color: #f66; }
    #btnArea {
      position: fixed; bottom: 0; left: 0; right: 0; height: 110px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #222; z-index: 31; padding: 10px;
    }
    button {
      padding: 14px 22px; border-radius: 10px; border: none;
      font-size: 15px; font-weight: 800; cursor: pointer; touch-action: manipulation;
    }
    #btnStart { background: #0b4f9a; color: #fff; }
    #btnClear { background: #444; color: #fff; }

    /* A-Frame は裏で動かす（ログに隠れる） */
    a-scene { position: fixed !important; inset: 0 !important; z-index: 1; }
  </style>
</head>
<body>

<div id="log">🔍 デバッグログ開始\n</div>

<div id="btnArea">
  <button id="btnStart">▶ START</button>
  <button id="btnClear">ログ消去</button>
</div>

<a-scene
  id="arScene"
  mindar-image="imageTargetSrc: targets.mind; uiLoading: no; uiScanning: no; uiError: no;"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <img id="asset1" src="step1.png" crossorigin="anonymous" />
    <img id="asset2" src="step2.png" crossorigin="anonymous" />
    <img id="asset3" src="step3.png" crossorigin="anonymous" />
  </a-assets>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  <a-entity mindar-image-target="targetIndex: 0">
    <a-image id="img1" src="#asset1" position="0 0 0" width="1" height="1"
             material="transparent:true; opacity:0;"></a-image>
  </a-entity>
</a-scene>

<script>
(function(){
  const logEl = document.getElementById('log');
  const arScene = document.getElementById('arScene');

  function log(msg, type) {
    const cls = type || '';
    const t = new Date().toLocaleTimeString('ja-JP', {hour12:false});
    logEl.innerHTML += `<span class="${cls}">[${t}] ${msg}</span>\n`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  document.getElementById('btnClear').onclick = () => { logEl.innerHTML = ''; };

  // ── グローバルエラーを全捕捉 ──
  window.addEventListener('error', e => {
    log('❌ JS ERROR: ' + e.message + ' (' + e.filename + ':' + e.lineno + ')', 'err');
  });
  window.addEventListener('unhandledrejection', e => {
    log('❌ PROMISE REJECTION: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)), 'err');
  });

  // ── fetch で targets.mind が存在するか確認 ──
  log('📡 targets.mind の存在確認中…');
  fetch('targets.mind', { method: 'HEAD' })
    .then(r => {
      if (r.ok) {
        log('✅ targets.mind: HTTP ' + r.status + ' (' + (r.headers.get('content-length') || '?') + ' bytes)', 'ok');
      } else {
        log('❌ targets.mind: HTTP ' + r.status + ' — ファイルが見つかりません！', 'err');
      }
    })
    .catch(e => log('❌ targets.mind fetch失敗: ' + e.message, 'err'));

  // ── step画像の存在確認 ──
  ['step1.png','step2.png','step3.png'].forEach(name => {
    fetch(name, { method: 'HEAD' })
      .then(r => log((r.ok ? '✅ ' : '❌ ') + name + ': HTTP ' + r.status, r.ok ? 'ok' : 'err'))
      .catch(e => log('❌ ' + name + ' fetch失敗: ' + e.message, 'err'));
  });

  // ── A-Frame / MindAR のイベント監視 ──
  log('⏳ a-scene の読み込み待ち…');

  arScene.addEventListener('loaded', () => log('✅ a-scene: loaded', 'ok'));
  arScene.addEventListener('renderstart', () => log('✅ a-scene: renderstart', 'ok'));

  // MindAR 固有イベント
  ['arReady','arError','arLoading'].forEach(ev => {
    arScene.addEventListener(ev, e => log('📌 MindAR event: ' + ev + ' ' + JSON.stringify(e.detail || ''), 'ok'));
  });

  // DOM変化で video 要素の生成を監視
  const mo = new MutationObserver(() => {
    document.querySelectorAll('video').forEach(v => {
      if (!v._logged) {
        v._logged = true;
        log('📹 video要素生成: class="' + v.className + '" src=' + (v.src || v.srcObject ? '有' : '無'), 'ok');
        v.addEventListener('playing', () => log('▶️ video playing: ' + v.videoWidth + 'x' + v.videoHeight, 'ok'));
        v.addEventListener('error',   () => log('❌ video error: ' + (v.error && v.error.message), 'err'));
        v.addEventListener('stalled', () => log('⚠️ video stalled', 'warn'));
      }
    });
  });
  mo.observe(document.documentElement, { childList: true, subtree: true });

  // ── STARTボタン ──
  document.getElementById('btnStart').addEventListener('click', async () => {
    log('👆 STARTタップ');

    try {
      log('📡 getUserMedia 要求中…');
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } }, audio: false
        });
      } catch(_) {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      }

      const tracks = stream.getVideoTracks();
      log('✅ getUserMedia 成功: ' + (tracks[0] && tracks[0].label), 'ok');

      // video 要素を全探索してストリームを注入
      const videos = document.querySelectorAll('video');
      log('📹 現在のvideo要素数: ' + videos.length);

      if (videos.length === 0) {
        log('⚠️ video要素がまだありません。5秒待ちます…', 'warn');
        await new Promise(r => setTimeout(r, 5000));
        const vs2 = document.querySelectorAll('video');
        log('📹 5秒後のvideo要素数: ' + vs2.length, vs2.length > 0 ? 'ok' : 'err');
      }

      document.querySelectorAll('video').forEach((v, i) => {
        try {
          v.setAttribute('playsinline', '');
          v.setAttribute('webkit-playsinline', '');
          v.muted = true;
          v.srcObject = stream;
          v.play().then(() => log('▶️ video[' + i + '] play() 成功', 'ok'))
                  .catch(e2 => log('❌ video[' + i + '] play() 失敗: ' + e2.message, 'err'));
        } catch(e3) {
          log('❌ video[' + i + '] srcObject注入失敗: ' + e3.message, 'err');
        }
      });

      // systems / components のキー一覧をログ出力
      if (arScene.systems) {
        log('🔧 systems: ' + Object.keys(arScene.systems).join(', '));
      }
      if (arScene.components) {
        log('🔧 components: ' + Object.keys(arScene.components).join(', '));
      }

    } catch(e) {
      log('❌ エラー [' + e.name + ']: ' + e.message, 'err');
    }
  });

  // ── 5秒ごとに状態スナップショット ──
  setInterval(() => {
    const vs = document.querySelectorAll('video');
    vs.forEach((v, i) => {
      log(`📊 video[${i}] paused=${v.paused} readyState=${v.readyState} ${v.videoWidth}x${v.videoHeight}`);
    });
    if (vs.length === 0) log('📊 video要素: なし', 'warn');
  }, 5000);

})();
</script>
</body>
</html>
