<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>水龍神AR（安定版・①→②→③フェード）</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body{ margin:0; overflow:hidden; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; background:#000; }
    .ui{
      position:fixed; left:12px; right:12px; top:12px;
      background:rgba(0,0,0,.58); color:#fff; padding:10px 12px;
      border-radius:12px; z-index:10; line-height:1.45;
      backdrop-filter: blur(6px);
    }
    .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .pill{ display:inline-block; padding:2px 10px; border-radius:999px; background:rgba(255,255,255,.15); }
    .ok{ background:rgba(80,200,120,.25); }
    .wait{ background:rgba(255,255,255,.15); }
  </style>

  <script>
    // 常にカメラ正面を向く（壁貼りでも見やすい）
    AFRAME.registerComponent('look-at-camera', {
      tick: function () {
        const cam = document.querySelector('[camera]');
        if (!cam) return;
        this.el.object3D.lookAt(cam.object3D.getWorldPosition(new THREE.Vector3()));
      }
    });

    // ①→②→③（3秒ごと）フェード切替：FOUND時だけ動く
    AFRAME.registerComponent('sequence-3-fade', {
      init: function () {
        this.running = false;
        this.timers = [];

        this.p1 = document.querySelector('#p1');
        this.p2 = document.querySelector('#p2');
        this.p3 = document.querySelector('#p3');

        this.statusEl = document.getElementById('status');
        this.stepEl = document.getElementById('step');

        const marker = this.el;

        const setStatus = (found) => {
          if (!this.statusEl) return;
          this.statusEl.innerHTML = found
            ? `マーカー検出 <span class="pill ok">FOUND</span>`
            : `マーカーを映してください <span class="pill wait">WAIT</span>`;
        };

        const setStep = (n) => {
          if (!this.stepEl) return;
          this.stepEl.innerHTML = `表示：${n} <span class="pill ok">OK</span>`;
        };

        const clearTimers = () => {
          this.timers.forEach(id => clearTimeout(id));
          this.timers = [];
        };

        const hideAll = () => {
          // WAIT中は何も出さない（誤解防止）
          this.p1.setAttribute('material', 'opacity', 0);
          this.p2.setAttribute('material', 'opacity', 0);
          this.p3.setAttribute('material', 'opacity', 0);
        };

        const showOnly = (n) => {
          this.p1.setAttribute('material', 'opacity', n === 1 ? 1 : 0);
          this.p2.setAttribute('material', 'opacity', n === 2 ? 1 : 0);
          this.p3.setAttribute('material', 'opacity', n === 3 ? 1 : 0);
          setStep(n);
        };

        const fadeTo = (fromEl, toEl, n) => {
          fromEl.setAttribute('animation__fadeout', {
            property:'material.opacity', from:1, to:0, dur:650, easing:'easeOutQuad'
          });
          toEl.setAttribute('animation__fadein', {
            property:'material.opacity', from:0, to:1, dur:950, easing:'easeOutCubic'
          });
          setStep(n);
        };

        const start = () => {
          if (this.running) return;
          this.running = true;

          // ①から開始
          showOnly(1);

          // 3秒後：①→②
          this.timers.push(setTimeout(() => fadeTo(this.p1, this.p2, 2), 3000));
          // 6秒後：②→③
          this.timers.push(setTimeout(() => fadeTo(this.p2, this.p3, 3), 6000));
        };

        const reset = () => {
          clearTimers();
          this.running = false;
          setStatus(false);
          hideAll();
          if (this.stepEl) this.stepEl.innerHTML = ``;
        };

        // 初期：WAIT
        reset();

        marker.addEventListener('markerFound', () => {
          setStatus(true);
          start();
        });

        marker.addEventListener('markerLost', () => {
          reset();
        });
      }
    });
  </script>
</head>

<body>
  <div class="ui">
    <div class="row">
      <b>手順：</b> カメラ許可 → 弱った水龍神マーカーを映す
      <span id="status">マーカーを映してください <span class="pill wait">WAIT</span></span>
      <span id="step"></span>
    </div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled:false"
    renderer="precision: medium; antialias: true;"
    arjs="
      sourceType: webcam;
      debugUIEnabled: false;
      sourceWidth: 1280;
      sourceHeight: 720;
      displayWidth: 1280;
      displayHeight: 720;
    "
  >
    <a-assets>
      <img id="img1" src="step1.png" />
      <img id="img2" src="step2.png" />
      <img id="img3" src="step3.png" />
    </a-assets>

    <!-- ★重要：emitevents="true" を必ず付ける -->
    <a-marker
      type="pattern"
      url="pattern-marker.patt"
      emitevents="true"
      sequence-3-fade
      smooth="true" smoothCount="7" smoothTolerance="0.01" smoothThreshold="2"
    >
      <!-- 壁貼りでも見える配置 -->
      <a-entity look-at-camera position="0 0 0.7" scale="1 1 1">

        <!-- チラつき防止にZを少しずらす -->
        <a-plane id="p1" position="0 0 0.000" width="1.1" height="1.95"
          material="src:#img1; transparent:true; opacity:0; side:double; alphaTest:0.01;"></a-plane>

        <a-plane id="p2" position="0 0 0.002" width="1.1" height="1.95"
          material="src:#img2; transparent:true; opacity:0; side:double; alphaTest:0.01;"></a-plane>

        <a-plane id="p3" position="0 0 0.004" width="1.1" height="1.95"
          material="src:#img3; transparent:true; opacity:0; side:double; alphaTest:0.01;"></a-plane>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
