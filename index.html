<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>kawazarai-ar</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    }
    a-scene { position: fixed !important; inset: 0 !important; }
    canvas { width: 100vw !important; height: 100vh !important; }

    /* HUD（重い演出を避ける） */
    #hud {
      position: fixed;
      top: env(safe-area-inset-top);
      left: env(safe-area-inset-left);
      right: env(safe-area-inset-right);
      padding: 12px;
      z-index: 10;
      pointer-events: none;
      color: #fff;
    }
    #panel {
      display: inline-block;
      max-width: 92vw;
      background: rgba(0,0,0,.55);
      border-radius: 14px;
      padding: 12px 14px;
    }
    #title { margin: 0 0 6px; font-weight: 800; font-size: 18px; }
    #desc  { margin: 0 0 8px; font-size: 14px; line-height: 1.5; opacity: .95; }
    #row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .pill { padding: 6px 12px; border-radius: 999px; font-weight: 800; font-size: 14px; }
    #pillState { background: #8a5a00; }
    #pillShowing { background: #0b6b3a; display: none; }
    #meta { margin-top: 6px; font-size: 12px; opacity: .85; }

    /* ガイド枠 */
    #guideWrap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 9; pointer-events: none;
    }
    #guide {
      width: min(84vw, 640px);
      aspect-ratio: 1 / 1;
      border: 4px dashed rgba(255,255,255,.75);
      border-radius: 22px;
    }
    #guideHint {
      position: fixed;
      left: 50%; transform: translateX(-50%);
      bottom: calc(env(safe-area-inset-bottom) + 18px);
      z-index: 9;
      color: #fff;
      background: rgba(0,0,0,.45);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      white-space: nowrap;
      pointer-events: none;
    }

    /* STARTオーバーレイ（ユーザー操作を確実に発生させる） */
    #startOverlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 20;
      background: rgba(0,0,0,.75);
      color: #fff;
      padding: 20px;
    }
    #startCard {
      width: min(92vw, 520px);
      background: rgba(20,20,20,.85);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 16px;
      padding: 18px 16px;
      text-align: center;
    }
    #startCard h2 { margin: 0 0 10px; font-size: 18px; }
    #startCard p  { margin: 0 0 14px; font-size: 13px; opacity: .9; line-height: 1.6; }
    #startBtn {
      pointer-events: auto;
      appearance: none; border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 16px;
      background: #0b4f9a;
      color: #fff;
    }
    #startErr {
      margin-top: 12px;
      font-size: 12px;
      color: #ffb3b3;
      white-space: pre-wrap;
      text-align: left;
      display: none;
    }
  </style>
</head>

<body>
  <div id="startOverlay">
    <div id="startCard">
      <h2>カメラを開始します</h2>
      <p>
        iPhone Safariでは「タップ操作」がないと<br>
        カメラ映像が黒いままになることがあります。<br>
        下のボタンを押して開始してください。
      </p>
      <button id="startBtn">START</button>
      <div id="startErr"></div>
    </div>
  </div>

  <div id="hud">
    <div id="panel">
      <p id="title">手順：</p>
      <p id="desc">カメラ許可 → マーカーをガイド枠に入れてください</p>
      <div id="row">
        <span id="pillState" class="pill">WAIT</span>
        <span id="pillShowing" class="pill">表示中：<span id="showingNum">-</span></span>
      </div>
      <div id="meta">
        <span id="metaCam">camera: -</span> /
        <span id="metaPatt">patt: OK</span>
      </div>
    </div>
  </div>

  <div id="guideWrap"><div id="guide"></div></div>
  <div id="guideHint">※ マーカーをできるだけ大きく、ピントが合う距離で</div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="antialias: true; alpha: true; precision: mediump;"
    arjs="
      trackingMethod: best;
      sourceType: webcam;
      debugUIEnabled: false;
      /* iPhone安定優先：あえて小さめ開始（黒画面回避に効くことが多い） */
      sourceWidth: 640;
      sourceHeight: 480;
      displayWidth: 640;
      displayHeight: 480;
    "
  >
    <a-marker id="marker" type="pattern" url="pattern-marker.patt" emitevents="true">
      <a-entity position="0 0 0">
        <a-image id="img1" src="step1.png" position="0 0 0" rotation="-90 0 0" width="1.7" height="1.7"
                 material="transparent:true; opacity:0;"></a-image>
        <a-image id="img2" src="step2.png" position="0 0 0" rotation="-90 0 0" width="1.7" height="1.7"
                 material="transparent:true; opacity:0;"></a-image>
        <a-image id="img3" src="step3.png" position="0 0 0" rotation="-90 0 0" width="1.7" height="1.7"
                 material="transparent:true; opacity:0;"></a-image>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const startOverlay = document.getElementById('startOverlay');
    const startBtn = document.getElementById('startBtn');
    const startErr = document.getElementById('startErr');

    const pillState   = document.getElementById('pillState');
    const pillShowing = document.getElementById('pillShowing');
    const showingNum  = document.getElementById('showingNum');
    const metaCam     = document.getElementById('metaCam');

    const marker = document.getElementById('marker');
    const imgs = [document.getElementById('img1'), document.getElementById('img2'), document.getElementById('img3')];

    let timer = null;
    let index = 0;
    let found = false;

    function fadeTo(nextIdx) {
      imgs.forEach((img, i) => {
        img.removeAttribute('animation__fade');
        const target = (i === nextIdx) ? 1 : 0;
        img.setAttribute('animation__fade', {
          property: 'material.opacity',
          to: target,
          dur: 650,
          easing: 'easeInOutQuad'
        });
      });
    }

    function showStep(i) {
      index = i;
      showingNum.textContent = String(i + 1);
      pillShowing.style.display = 'inline-block';
      fadeTo(i);
    }

    function startLoop() {
      stopLoop();
      showStep(0);
      timer = setInterval(() => {
        if (!found) return;
        showStep((index + 1) % imgs.length);
      }, 3000);
    }

    function stopLoop() {
      if (timer) { clearInterval(timer); timer = null; }
    }

    marker.addEventListener('markerFound', () => {
      found = true;
      pillState.textContent = 'FOUND';
      pillState.style.background = '#0b4f9a';
      startLoop();
    });

    marker.addEventListener('markerLost', () => {
      found = false;
      pillState.textContent = 'WAIT';
      pillState.style.background = '#8a5a00';
      pillShowing.style.display = 'none';
      stopLoop();
      imgs.forEach(img => img.setAttribute('material', 'opacity', 0));
    });

    // ---- iOS Safari対策：videoが生成された瞬間に属性を付与し、STARTタップで再生開始 ----
    let arVideo = null;

    function applyVideoAttrs(v) {
      v.setAttribute('playsinline', '');
      v.setAttribute('webkit-playsinline', '');
      v.muted = true;
      v.autoplay = true;
      // iOSで効くことがある
      v.setAttribute('muted', '');
      v.setAttribute('autoplay', '');
    }

    // video生成監視（AR.jsが後からvideoを作る）
    const mo = new MutationObserver(() => {
      const v = document.querySelector('video');
      if (v && v !== arVideo) {
        arVideo = v;
        applyVideoAttrs(arVideo);
      }
    });
    mo.observe(document.documentElement, { childList: true, subtree: true });

    // camera状態表示
    setInterval(() => {
      const v = arVideo || document.querySelector('video');
      if (v) {
        metaCam.textContent = `camera: OK (${v.videoWidth || '-'}x${v.videoHeight || '-'})`;
      }
    }, 400);

    async function startCameraByUserGesture() {
      startErr.style.display = 'none';
      startErr.textContent = '';

      try {
        // まず video を掴む（まだ無ければ少し待つ）
        for (let i = 0; i < 20; i++) {
          const v = document.querySelector('video');
          if (v) { arVideo = v; break; }
          await new Promise(r => setTimeout(r, 100));
        }
        if (!arVideo) throw new Error('video要素が見つかりません（AR.jsの初期化待ち）。');

        applyVideoAttrs(arVideo);

        // iPhone Safari：ユーザー操作中に play() を実行するのが重要
        await arVideo.play();

        // 成功したらオーバーレイを消す
        startOverlay.style.display = 'none';

      } catch (e) {
        startErr.style.display = 'block';
        startErr.textContent =
          'START後も映像が開始できませんでした。\n' +
          '以下を確認してください：\n' +
          '・iPhone設定 > Safari > カメラ が「許可」になっている\n' +
          '・低電力モードOFF\n' +
          '・上部に「保護を緩和」が出る場合は押して再読み込み\n\n' +
          'エラー:\n' + (e && e.message ? e.message : String(e));
      }
    }

    startBtn.addEventListener('click', startCameraByUserGesture);
  </script>
</body>
</html>
