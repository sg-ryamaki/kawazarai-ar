<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>水龍神AR 完全安定版</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif;}
.ui{
position:fixed;left:12px;right:12px;top:12px;
background:rgba(0,0,0,.6);color:#fff;
padding:10px;border-radius:12px;
z-index:10;backdrop-filter:blur(6px);
}
.pill{padding:2px 10px;border-radius:999px;background:rgba(255,255,255,.2);}
.ok{background:rgba(0,200,120,.4);}
.wait{background:rgba(255,255,255,.2);}
.ng{background:rgba(255,80,80,.4);}
</style>

<script>
AFRAME.registerComponent('look-at-camera',{
  tick:function(){
    const cam=document.querySelector('[camera]');
    if(!cam)return;
    this.el.object3D.lookAt(cam.object3D.getWorldPosition(new THREE.Vector3()));
  }
});

function waitImg(id){
  return new Promise((resolve,reject)=>{
    const img=document.getElementById(id);
    if(img.complete && img.naturalWidth>0) return resolve();
    img.onload=()=>resolve();
    img.onerror=()=>reject();
  });
}

AFRAME.registerComponent('sequence-3-fade',{
  init:function(){
    this.running=false;
    this.ready=false;
    this.timers=[];
    this.p1=document.querySelector('#p1');
    this.p2=document.querySelector('#p2');
    this.p3=document.querySelector('#p3');
    this.status=document.getElementById('status');
    this.step=document.getElementById('step');
    const marker=this.el;

    const setStatus=(html)=>this.status.innerHTML=html;
    const setStep=(html)=>this.step.innerHTML=html;
    const clearTimers=()=>this.timers.forEach(t=>clearTimeout(t));

    const hideAll=()=>{
      this.p1.setAttribute('material','opacity',0);
      this.p2.setAttribute('material','opacity',0);
      this.p3.setAttribute('material','opacity',0);
    };

    const showOnly=(n)=>{
      this.p1.setAttribute('material','opacity',n===1?1:0);
      this.p2.setAttribute('material','opacity',n===2?1:0);
      this.p3.setAttribute('material','opacity',n===3?1:0);
      setStep("表示："+n+" <span class='pill ok'>OK</span>");
    };

    const fadeTo=(from,to,n)=>{
      from.setAttribute('animation__fadeout',{
        property:'material.opacity',from:1,to:0,dur:700
      });
      to.setAttribute('animation__fadein',{
        property:'material.opacity',from:0,to:1,dur:1000
      });
      setStep("表示："+n+" <span class='pill ok'>OK</span>");
    };

    (async()=>{
      try{
        setStatus("画像読込中 <span class='pill wait'>LOADING</span>");
        await Promise.all([waitImg('img1'),waitImg('img2'),waitImg('img3')]);
        this.ready=true;
        setStatus("マーカーを映してください <span class='pill wait'>WAIT</span>");
      }catch{
        setStatus("画像ロード失敗 <span class='pill ng'>NG</span>");
      }
    })();

    marker.addEventListener('markerFound',()=>{
      if(!this.ready)return;
      if(this.running)return;
      this.running=true;
      setStatus("マーカー検出 <span class='pill ok'>FOUND</span>");
      showOnly(1);
      this.timers.push(setTimeout(()=>fadeTo(this.p1,this.p2,2),3000));
      this.timers.push(setTimeout(()=>fadeTo(this.p2,this.p3,3),6000));
    });

    marker.addEventListener('markerLost',()=>{
      clearTimers();
      this.running=false;
      hideAll();
      setStep("");
      setStatus("マーカーを映してください <span class='pill wait'>WAIT</span>");
    });
  }
});
</script>
</head>

<body>

<div class="ui">
手順：カメラ許可 → マーカーを映す　
<span id="status"></span>　
<span id="step"></span>
</div>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="precision:medium;antialias:true;"
arjs="
sourceType:webcam;
trackingMethod:best;
debugUIEnabled:false;
sourceWidth:1280;
sourceHeight:720;
">

<a-assets timeout="20000">
<img id="img1" src="step1.png">
<img id="img2" src="step2.png">
<img id="img3" src="step3.png">
</a-assets>

<a-marker
type="pattern"
url="pattern-marker.patt"
emitevents="true"
smooth="true"
smoothCount="10"
smoothTolerance="0.01"
smoothThreshold="5"
sequence-3-fade
>

<a-entity look-at-camera position="0 0 0.7" scale="1 1 1">

<a-plane id="p1" position="0 0 0.000" width="1.1" height="1.95"
material="shader:flat;src:#img1;transparent:true;opacity:0;side:double;">
</a-plane>

<a-plane id="p2" position="0 0 0.002" width="1.1" height="1.95"
material="shader:flat;src:#img2;transparent:true;opacity:0;side:double;">
</a-plane>

<a-plane id="p3" position="0 0 0.004" width="1.1" height="1.95"
material="shader:flat;src:#img3;transparent:true;opacity:0;side:double;">
</a-plane>

</a-entity>
</a-marker>

<a-entity camera></a-entity>
</a-scene>

</body>
</html>
