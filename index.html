<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>水龍神AR（step1→2→3）</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }

    /* ✅ a-scene自体を画面固定＆全面に */
    a-scene, .a-canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 0 !important;
      background: #000 !important;
    }

    /* ✅ 黒帯対策の本命：中央基準で“はみ出してでも”全面カバー */
    #arjs-video, video {
      position: fixed !important;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;

      min-width: 100vw !important;
      min-height: 100vh !important;

      width: auto !important;
      height: auto !important;

      object-fit: cover !important;
      z-index: 0 !important;
      background: #000 !important;
    }

    canvas, .a-canvas canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 1 !important;
      background: transparent !important;
    }

    #hud{
      position: fixed; left: 14px; top: 14px; z-index: 9999;
      background: rgba(0,0,0,.55); color:#fff; padding: 12px 14px; border-radius: 14px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      line-height: 1.5; max-width: min(92vw, 560px);
      backdrop-filter: blur(6px);
    }
    #hud .row{ display:flex; gap:10px; align-items:center; flex-wrap: wrap; }
    #badge{
      display:inline-block; padding: 4px 10px; border-radius:999px;
      background:#8b5a00; color:#fff; font-weight:700;
    }
    #mini{ opacity:.85; font-size: 12px; margin-top:6px; }

    /* ガイド枠（邪魔なら display:none にしてOK） */
    #guide{
      position: fixed; right: 14px; top: 110px; z-index: 9998;
      width: min(42vw, 280px); height: min(56vh, 360px);
      border: 2px dashed rgba(255,255,255,.35);
      border-radius: 18px;
      pointer-events:none;
      box-shadow: 0 0 0 6px rgba(0,0,0,.25) inset;
    }
  </style>
</head>

<body>
  <div id="hud">
    <div class="row">
      <div style="font-weight:800;">手順：</div>
      <div>カメラ許可 → マーカーをガイド枠に入れてください</div>
    </div>
    <div class="row" style="margin-top:8px;">
      <span id="badge">WAIT</span>
      <span id="status">表示中：-</span>
    </div>
    <div id="mini">
      camera: <span id="camStat">…</span> ／ patt: <span id="pattStat">…</span>
    </div>
  </div>
  <div id="guide"></div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; colorManagement: true; alpha: true"
    arjs="
      sourceType: webcam;
      debugUIEnabled: false;

      /* ✅ 背面カメラ指定（効かない端末もあるが入れておく価値あり） */
      facingMode: environment;

      /* ✅ 解像度要求（端末が拒否すると下がる） */
      sourceWidth: 1280;
      sourceHeight: 720;
      displayWidth: 1280;
      displayHeight: 720;

      maxDetectionRate: 60;
      detectionMode: mono;
    "
  >
    <a-marker id="marker" type="pattern" url="pattern-marker.patt">
      <a-entity id="contentRoot" visible="false">
        <a-entity position="0 0 0.02">
          <a-image id="imgA" src="step1.png"
            position="0 0 0" width="1.2" height="1.6"
            material="transparent:true; opacity: 1"></a-image>
          <a-image id="imgB" src="step2.png"
            position="0 0 0.001" width="1.2" height="1.6"
            material="transparent:true; opacity: 0"></a-image>
        </a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera="near: 0.01; far: 10000"></a-entity>
  </a-scene>

  <script>
    const STEPS = ["step1.png", "step2.png", "step3.png"];
    const STEP_MS = 3000;
    const FADE_MS = 700;

    const badge = document.getElementById("badge");
    const statusEl = document.getElementById("status");
    const camStat = document.getElementById("camStat");
    const pattStat = document.getElementById("pattStat");

    const marker = document.getElementById("marker");
    const contentRoot = document.getElementById("contentRoot");
    const imgA = document.getElementById("imgA");
    const imgB = document.getElementById("imgB");

    let found = false;
    let timer = null;
    let stepIndex = 0;
    let front = "A";

    function tweenOpacity(el, from, to, ms) {
      return new Promise((resolve) => {
        const start = performance.now();
        function tick(now) {
          const t = Math.min(1, (now - start) / ms);
          const v = from + (to - from) * t;
          el.setAttribute("material", "transparent:true; opacity:" + v.toFixed(3));
          if (t < 1) requestAnimationFrame(tick);
          else resolve();
        }
        requestAnimationFrame(tick);
      });
    }

    function setHudWait() {
      badge.textContent = "WAIT";
      badge.style.background = "#8b5a00";
      statusEl.textContent = "表示中：-";
    }
    function setHudFound(n) {
      badge.textContent = "FOUND";
      badge.style.background = "#0f7a2b";
      statusEl.textContent = "表示中：" + n;
    }

    async function crossFadeTo(nextSrc) {
      const frontEl = (front === "A") ? imgA : imgB;
      const backEl  = (front === "A") ? imgB : imgA;

      backEl.setAttribute("src", nextSrc);

      await Promise.all([
        tweenOpacity(frontEl, 1, 0, FADE_MS),
        tweenOpacity(backEl,  0, 1, FADE_MS)
      ]);

      front = (front === "A") ? "B" : "A";
    }

    function startSequence() {
      stopSequence();

      stepIndex = 0;
      front = "A";
      imgA.setAttribute("src", STEPS[0]);
      imgA.setAttribute("material", "transparent:true; opacity:1");
      imgB.setAttribute("src", STEPS[1]);
      imgB.setAttribute("material", "transparent:true; opacity:0");

      setHudFound(1);
      contentRoot.setAttribute("visible", "true");

      timer = setInterval(async () => {
        if (!found) return;
        stepIndex = (stepIndex + 1) % STEPS.length;
        setHudFound(stepIndex + 1);
        await crossFadeTo(STEPS[stepIndex]);
      }, STEP_MS);
    }

    function stopSequence() {
      if (timer) { clearInterval(timer); timer = null; }
      contentRoot.setAttribute("visible", "false");
      setHudWait();
    }

    marker.addEventListener("markerFound", () => {
      found = true;
      startSequence();
    });
    marker.addEventListener("markerLost", () => {
      found = false;
      stopSequence();
    });

    function updateCameraStat() {
      const video = document.querySelector("video");
      if (!video) { camStat.textContent = "…"; return; }
      const w = video.videoWidth || 0;
      const h = video.videoHeight || 0;
      camStat.textContent = (w && h) ? `OK (${w}x${h})` : "OK (starting...)";
    }

    async function updatePattStat() {
      try {
        const res = await fetch("pattern-marker.patt", { cache: "no-store" });
        const txt = await res.text();
        pattStat.textContent = `OK (${txt.length} chars)`;
      } catch (e) {
        pattStat.textContent = "NG (fetch error)";
      }
    }

    // ✅ iOSの再生ロック・復帰対策（黒画面/停止の保険）
    async function forcePlayVideo() {
      const v = document.querySelector("video");
      if (!v) return;
      try { await v.play(); } catch (e) {}
    }

    setHudWait();
    updatePattStat();
    setInterval(updateCameraStat, 500);
    setTimeout(updatePattStat, 1500);

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) forcePlayVideo();
    });

    document.body.addEventListener("click", () => {
      forcePlayVideo();
    }, { passive: true });

    // ✅ 起動直後にも一度トライ
    setTimeout(forcePlayVideo, 800);
  </script>
</body>
</html>
