<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>AR debug</title>
  <style>
    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:#000;
      color:#fff;
      font-family:sans-serif;
    }
    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(92vw,520px);
      background:#111;
      border:1px solid rgba(255,255,255,.2);
      border-radius:16px;
      padding:24px;
      text-align:center;
    }
    h1{font-size:24px;margin-bottom:12px}
    p{font-size:14px;line-height:1.7;margin-bottom:16px}
    button{
      appearance:none;
      border:none;
      background:#0b4f9a;
      color:#fff;
      padding:14px 28px;
      border-radius:12px;
      font-size:16px;
      font-weight:700;
    }
    #log{
      margin-top:16px;
      font-size:13px;
      color:#9fd3ff;
      white-space:pre-wrap;
      text-align:left;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>ARデバッグ画面</h1>
      <p>
        この画面が見えれば、<br>
        GitHub Pages の表示自体は正常です。
      </p>
      <button id="btn">表示確認OK</button>
      <div id="log">読み込み成功</div>
    </div>
  </div>

  <script>
    const log = document.getElementById('log');
    const btn = document.getElementById('btn');

    log.textContent = 'HTML / CSS / JavaScript 読み込み成功';

    btn.addEventListener('click', () => {
      log.textContent = 'ボタン動作OK';
    });

    window.addEventListener('error', (e) => {
      log.textContent = 'JSエラー: ' + e.message;
    });
  </script>
</body>
</html>
