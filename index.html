<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>kawazarai-ar</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- AR.js (Pattern Marker / A-Frame build) -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
        background: #000;
      }
      .hud {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 9999;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
        font-size: 13px;
        line-height: 1.5;
        max-width: 78vw;
      }
      .hud b { font-weight: 700; }
    </style>
  </head>

  <body>
    <div class="hud">
      <b>読み取りのコツ</b><br />
      ・マーカー全体が画面に入る距離で<br />
      ・逆光/反射（ラミネート）を避ける
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      renderer="antialias: true; alpha: true; colorManagement: true;"
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-assets>
        <!-- 現在のGitHub構成に完全一致（直下配置） -->
        <img id="step1" src="step1.png" />
        <img id="step2" src="step2.png" />
        <img id="step3" src="step3.png" />
      </a-assets>

      <!-- pattern-marker.patt を参照 -->
      <a-marker type="pattern" url="pattern-marker.patt" id="marker">
        <a-image
          id="panel"
          src="#step1"
          position="0 0 0"
          rotation="-90 0 0"
          width="1.25"
          height="1.25"
          opacity="1"
        ></a-image>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      window.addEventListener("load", () => {
        const marker = document.getElementById("marker");
        const panel = document.getElementById("panel");

        const steps = ["#step1", "#step2", "#step3"];
        let idx = 0;

        const STEP_MS = 3000; // ★ 3秒間隔
        let timer = null;

        const setStep = (i) => {
          idx = (i + steps.length) % steps.length;
          panel.setAttribute("src", steps[idx]);
        };

        const next = () => setStep(idx + 1);

        const start = () => {
          if (timer) return; // 二重起動防止
          setStep(0);        // 読み取り開始時は必ずstep1から
          timer = setInterval(() => {
            next();          // ★ 無限ループ
          }, STEP_MS);
        };

        const stop = () => {
          if (timer) {
            clearInterval(timer);
            timer = null;
          }
          setStep(0);        // マーカーが外れたらstep1へ戻す
        };

        marker.addEventListener("markerFound", () => {
          console.log("markerFound");
          start();
        });

        marker.addEventListener("markerLost", () => {
          console.log("markerLost");
          stop();
        });
      });
    </script>
  </body>
</html>
