<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Water Dragon WebAR</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      background: #000;
    }

    #bgVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
    }

    #stepImg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity .22s ease;
      pointer-events: none;
      z-index: 20;
    }

    #stepImg.visible {
      opacity: 1;
    }

    #guide {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .guide-box {
      width: min(72vw, 72vh, 360px);
      aspect-ratio: 1 / 1;
      border: 3px solid rgba(255,255,255,.92);
      border-radius: 18px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.16);
      position: relative;
    }

    .guide-box::before,
    .guide-box::after {
      content: "";
      position: absolute;
      border-radius: 12px;
    }

    .guide-box::before {
      inset: 12px;
      border: 2px dashed rgba(255,255,255,.28);
    }

    .guide-box::after {
      inset: 30px;
      border: 1px solid rgba(255,255,255,.18);
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background: linear-gradient(to bottom, rgba(0,0,0,.45), rgba(0,0,0,.68));
    }

    #overlay.hidden {
      display: none;
    }

    .panel {
      width: min(92vw, 540px);
      border-radius: 18px;
      background: rgba(17,17,17,.90);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
      color: #fff;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .panel h1 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.3;
    }

    .panel p {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,.88);
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 14px;
      background: #0b4f9a;
      color: #fff;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: .6;
      cursor: default;
    }

    #retryBtn {
      margin-top: 12px;
      background: #5a5a5a;
      display: none;
    }

    #errorText {
      margin-top: 14px;
      white-space: pre-wrap;
      text-align: left;
      font-size: 13px;
      line-height: 1.6;
      color: #ffd0d0;
      display: none;
    }

    #statusBar {
      position: absolute;
      left: 12px;
      right: 12px;
      top: max(12px, env(safe-area-inset-top));
      z-index: 50;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: #fff;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(6px);
    }

    #statePill.wait {
      background: rgba(138,90,0,.82);
    }

    #statePill.found {
      background: rgba(11,79,154,.88);
    }

    #debug {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 55;
      background: rgba(0,0,0,.50);
      color: #d7ecff;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.55;
      backdrop-filter: blur(6px);
      white-space: pre-wrap;
    }

    #procCanvas {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="bgVideo" playsinline webkit-playsinline muted></video>
    <img id="stepImg" alt="AR content">

    <div id="guide">
      <div class="guide-box"></div>
    </div>

    <div id="statusBar">
      <div id="statePill" class="pill wait">WAIT</div>
      <div id="showPill" class="pill" style="display:none;">STEP <span id="showNum">1</span></div>
    </div>

    <div id="overlay">
      <div class="panel">
        <h1>ARを開始します</h1>
        <p>
          カメラ権限を許可して、<br>
          マーカー画像「①.png」を中央の枠に入れてください。<br>
          認識後、Step1→Step2→Step3→Step4 をループ表示します。
        </p>
        <button id="startBtn" class="btn">START</button>
        <button id="retryBtn" class="btn">再試行</button>
        <div id="errorText"></div>
      </div>
    </div>

    <div id="debug">初期化待機中...</div>
    <canvas id="procCanvas" width="160" height="120"></canvas>
  </div>

  <script>
    (() => {
      'use strict';

      const STEP_IMAGES = ['step1.png', 'step2.png', 'step3.png', 'step4.png'];
      const STEP_DURATIONS = [4000, 3000, 3000, 3000];

      const SCAN_W = 160;
      const SCAN_H = 120;

      // 誤検出を減らすための連続判定
      const FOUND_NEED = 5;
      const LOST_NEED = 8;

      const bgVideo = document.getElementById('bgVideo');
      const stepImg = document.getElementById('stepImg');
      const overlay = document.getElementById('overlay');
      const startBtn = document.getElementById('startBtn');
      const retryBtn = document.getElementById('retryBtn');
      const errorText = document.getElementById('errorText');
      const debug = document.getElementById('debug');
      const procCanvas = document.getElementById('procCanvas');
      const procCtx = procCanvas.getContext('2d', { willReadFrequently: true });

      const statePill = document.getElementById('statePill');
      const showPill = document.getElementById('showPill');
      const showNum = document.getElementById('showNum');

      let stream = null;
      let started = false;
      let isFound = false;
      let foundCount = 0;
      let lostCount = 0;
      let stepIndex = 0;
      let stepTimer = null;
      let frameCount = 0;

      function setDebug(msg) {
        debug.textContent = msg;
        console.log(msg);
      }

      function setState(found) {
        isFound = found;
        if (found) {
          statePill.textContent = 'FOUND';
          statePill.classList.remove('wait');
          statePill.classList.add('found');
        } else {
          statePill.textContent = 'WAIT';
          statePill.classList.remove('found');
          statePill.classList.add('wait');
        }
      }

      function preloadImages() {
        STEP_IMAGES.forEach(src => {
          const img = new Image();
          img.src = src;
        });
      }

      function showStep(i) {
        stepIndex = i;
        showNum.textContent = String(i + 1);
        showPill.style.display = 'inline-flex';
        stepImg.classList.remove('visible');

        setTimeout(() => {
          stepImg.src = STEP_IMAGES[i];
          stepImg.classList.add('visible');
        }, 50);
      }

      function stopStepLoop() {
        if (stepTimer) {
          clearTimeout(stepTimer);
          stepTimer = null;
        }
      }

      function scheduleNextStep() {
        stopStepLoop();
        if (!isFound) return;

        const duration = STEP_DURATIONS[stepIndex] || 3000;

        stepTimer = setTimeout(() => {
          if (!isFound) return;
          const next = (stepIndex + 1) % STEP_IMAGES.length;
          showStep(next);
          scheduleNextStep();
        }, duration);
      }

      function startStepLoop() {
        stopStepLoop();
        showStep(0);
        scheduleNextStep();
      }

      function resetDisplay() {
        stopStepLoop();
        stepImg.classList.remove('visible');
        showPill.style.display = 'none';
      }

      function onMarkerFound() {
        if (isFound) return;
        setState(true);
        setDebug('マーカー認識: FOUND');
        startStepLoop();
      }

      function onMarkerLost() {
        if (!isFound) return;
        setState(false);
        setDebug('マーカー未認識: WAIT');
        resetDisplay();
      }

      async function startCamera() {
        startBtn.disabled = true;
        retryBtn.style.display = 'none';
        errorText.style.display = 'none';
        errorText.textContent = '';

        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error('このブラウザはカメラAPIに十分対応していません。');
          }

          const constraintsList = [
            {
              video: {
                facingMode: { ideal: 'environment' },
                width: { ideal: 1280 },
                height: { ideal: 720 }
              },
              audio: false
            },
            {
              video: {
                facingMode: 'environment'
              },
              audio: false
            },
            {
              video: true,
              audio: false
            }
          ];

          let lastError = null;

          for (const constraints of constraintsList) {
            try {
              stream = await navigator.mediaDevices.getUserMedia(constraints);
              break;
            } catch (err) {
              lastError = err;
            }
          }

          if (!stream) {
            throw lastError || new Error('カメラを起動できませんでした。');
          }

          bgVideo.srcObject = stream;
          bgVideo.setAttribute('playsinline', '');
          bgVideo.setAttribute('webkit-playsinline', '');
          bgVideo.muted = true;
          await bgVideo.play();

          overlay.classList.add('hidden');
          started = true;
          foundCount = 0;
          lostCount = 0;
          setState(false);
          setDebug('カメラ起動完了。マーカー待機中...');
        } catch (err) {
          console.error(err);
          errorText.style.display = 'block';
          errorText.textContent =
            'カメラを起動できませんでした。\n' +
            '・Safari / Chrome で開いているか\n' +
            '・GitHub Pages の URL で開いているか\n' +
            '・カメラ権限を許可しているか\n\n' +
            '詳細: ' + (err && err.message ? err.message : String(err));
          retryBtn.style.display = 'inline-block';
          startBtn.disabled = false;
          setDebug('カメラ起動失敗');
        }
      }

      function stopCamera() {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }
      }

      // 中央のガイド枠付近だけを対象にして、白背景率・黒文字率・青要素率を判定
      function analyzeFrame() {
        if (!bgVideo.videoWidth || !bgVideo.videoHeight) return null;

        procCtx.drawImage(bgVideo, 0, 0, SCAN_W, SCAN_H);
        const imageData = procCtx.getImageData(0, 0, SCAN_W, SCAN_H);
        const data = imageData.data;

        // ガイド枠に近い中央エリア
        const x0 = Math.floor(SCAN_W * 0.20);
        const y0 = Math.floor(SCAN_H * 0.12);
        const rw = Math.floor(SCAN_W * 0.60);
        const rh = Math.floor(SCAN_H * 0.76);

        // さらに中央文字っぽい位置
        const tx0 = Math.floor(SCAN_W * 0.28);
        const ty0 = Math.floor(SCAN_H * 0.18);
        const trw = Math.floor(SCAN_W * 0.44);
        const trh = Math.floor(SCAN_H * 0.58);

        let total = 0;
        let whiteCount = 0;
        let blackCount = 0;
        let blueCount = 0;

        let textTotal = 0;
        let textDarkCount = 0;

        let borderTotal = 0;
        let borderBlueCount = 0;

        for (let y = y0; y < y0 + rh; y += 2) {
          for (let x = x0; x < x0 + rw; x += 2) {
            const i = (y * SCAN_W + x) * 4;
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const lum = 0.299 * r + 0.587 * g + 0.114 * b;

            total++;

            if (lum > 178) whiteCount++;
            if (lum < 92) blackCount++;
            if (b > 95 && b > r + 18 && b > g + 10) blueCount++;

            const nearBorder =
              (x < x0 + 10) ||
              (x > x0 + rw - 10) ||
              (y < y0 + 10) ||
              (y > y0 + rh - 10);

            if (nearBorder) {
              borderTotal++;
              if (b > 95 && b > r + 18 && b > g + 10) borderBlueCount++;
            }

            const inTextArea =
              x >= tx0 && x < tx0 + trw &&
              y >= ty0 && y < ty0 + trh;

            if (inTextArea) {
              textTotal++;
              if (lum < 98) textDarkCount++;
            }
          }
        }

        if (total === 0 || textTotal === 0 || borderTotal === 0) return null;

        const whiteRatio = whiteCount / total;
        const blackRatio = blackCount / total;
        const blueRatio = blueCount / total;
        const textDarkRatio = textDarkCount / textTotal;
        const borderBlueRatio = borderBlueCount / borderTotal;

        // ばらつき対策: 中央以外の暗さ確認
        let outerDark = 0;
        let outerTotal = 0;

        for (let y = 0; y < SCAN_H; y += 4) {
          for (let x = 0; x < SCAN_W; x += 4) {
            const insideMain =
              x >= x0 && x < x0 + rw &&
              y >= y0 && y < y0 + rh;

            if (insideMain) continue;

            const i = (y * SCAN_W + x) * 4;
            const lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];

            outerTotal++;
            if (lum < 95) outerDark++;
          }
        }

        const outerDarkRatio = outerTotal > 0 ? outerDark / outerTotal : 0;

        return {
          whiteRatio,
          blackRatio,
          blueRatio,
          textDarkRatio,
          borderBlueRatio,
          outerDarkRatio
        };
      }

      function isMarkerLike(m) {
        if (!m) return false;

        const whiteOk = m.whiteRatio > 0.42 && m.whiteRatio < 0.88;
        const blackOk = m.blackRatio > 0.05 && m.blackRatio < 0.30;
        const textOk = m.textDarkRatio > 0.09 && m.textDarkRatio < 0.45;
        const blueOk = m.blueRatio > 0.008;
        const borderOk = m.borderBlueRatio > 0.010;
        const outerOk = m.outerDarkRatio < 0.45;

        return whiteOk && blackOk && textOk && blueOk && borderOk && outerOk;
      }

      function detectLoop() {
        requestAnimationFrame(detectLoop);

        if (!started) return;
        if (!bgVideo.videoWidth) return;

        frameCount++;
        if (frameCount % 2 !== 0) return;

        try {
          const m = analyzeFrame();
          if (!m) return;

          const detected = isMarkerLike(m);

          if (frameCount % 10 === 0) {
            setDebug(
              'カメラ起動完了\n' +
              '白背景率: ' + m.whiteRatio.toFixed(3) + '\n' +
              '黒要素率: ' + m.blackRatio.toFixed(3) + '\n' +
              '中央文字率: ' + m.textDarkRatio.toFixed(3) + '\n' +
              '青要素率: ' + m.blueRatio.toFixed(3) + '\n' +
              '外枠青率: ' + m.borderBlueRatio.toFixed(3) + '\n' +
              '外側暗率: ' + m.outerDarkRatio.toFixed(3) + '\n' +
              '現在状態: ' + (isFound ? 'FOUND' : 'WAIT')
            );
          }

          if (detected) {
            foundCount++;
            lostCount = 0;
            if (foundCount >= FOUND_NEED) {
              onMarkerFound();
            }
          } else {
            lostCount++;
            foundCount = 0;
            if (lostCount >= LOST_NEED) {
              onMarkerLost();
            }
          }

        } catch (err) {
          console.error(err);
          setDebug('検出処理エラー: ' + err.message);
        }
      }

      startBtn.addEventListener('click', startCamera);
      retryBtn.addEventListener('click', startCamera);
      window.addEventListener('beforeunload', stopCamera);

      preloadImages();
      setState(false);
      setDebug('開始画面表示OK。START を押してください。');
      detectLoop();
    })();
  </script>
</body>
</html>
