<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>水龍神AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

/* AR.jsが生成するvideoを最背面に強制 */
#arjs-video {
  position: fixed !important;
  top:0; left:0;
  width:100% !important;
  height:100% !important;
  object-fit:cover !important;
  z-index:0 !important;
  display:block !important;
  opacity:1 !important;
}

/* A-Frame描画canvasは透明＋videoの上に */
canvas.a-canvas,
#arjs-canvas {
  position: fixed !important;
  top:0; left:0;
  width:100% !important;
  height:100% !important;
  background:transparent !important;
  z-index:1 !important;
}

/* scene自体も透明 */
a-scene {
  position: fixed !important;
  inset: 0 !important;
  width:100% !important;
  height:100% !important;
  background:transparent !important;
  z-index:1 !important;
}

/* HUD */
.hud{
  position: fixed;
  top:12px;
  left:12px;
  right:12px;
  z-index:9999;
  color:#fff;
  background:rgba(0,0,0,0.55);
  padding:14px;
  border-radius:14px;
  font-family:-apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", sans-serif;
}
.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,160,0,0.3);
  margin-top:6px;
}
</style>
</head>

<body>

<div class="hud">
<strong>手順：</strong>カメラ許可 → 壁の「水龍神マーカー」を映してください<br>
<div id="status" class="badge">WAIT</div>
<div style="font-size:13px;margin-top:6px;">
camera: <span id="cam">...</span>
</div>
</div>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="antialias:true; alpha:true;"
arjs="sourceType:webcam; debugUIEnabled:false; trackingMethod:best;"
>

<a-assets>
<img id="img1" src="./step1.png?v=12">
<img id="img2" src="./step2.png?v=12">
<img id="img3" src="./step3.png?v=12">
</a-assets>

<a-marker type="pattern" url="./pattern-marker.patt?v=12" id="marker">

<a-image id="s1" src="#img1" position="0 0 0.01" width="1.2" height="1.2"
material="transparent:true; opacity:0;"></a-image>

<a-image id="s2" src="#img2" position="0 0 0.02" width="1.2" height="1.2"
material="transparent:true; opacity:0;"></a-image>

<a-image id="s3" src="#img3" position="0 0 0.03" width="1.2" height="1.2"
material="transparent:true; opacity:0;"></a-image>

</a-marker>

<a-entity camera></a-entity>
</a-scene>

<script>
const marker = document.getElementById("marker");
const statusEl = document.getElementById("status");
const camEl = document.getElementById("cam");

const steps = [
  document.getElementById("s1"),
  document.getElementById("s2"),
  document.getElementById("s3")
];

let index = 0;
let timer = null;

function hideAll(){
  steps.forEach(s => s.setAttribute("material","opacity",0));
}

function showStep(i){
  hideAll();
  steps[i].setAttribute("material","opacity",1);
}

marker.addEventListener("markerFound",()=>{
  statusEl.textContent="FOUND";
  index=0;
  showStep(index);
  timer=setInterval(()=>{
    index++;
    if(index>=steps.length){ clearInterval(timer); return; }
    showStep(index);
  },3000);
});

marker.addEventListener("markerLost",()=>{
  statusEl.textContent="WAIT";
  hideAll();
  clearInterval(timer);
});

function checkCamera(){
  const v=document.querySelector("#arjs-video");
  if(v && v.videoWidth>0){
    camEl.textContent=`OK (${v.videoWidth}x${v.videoHeight})`;
  }else{
    camEl.textContent="loading...";
  }
}
setInterval(checkCamera,800);
</script>

</body>
</html>
