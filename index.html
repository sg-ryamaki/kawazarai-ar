<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>水龍神AR</title>

  <!-- A-Frame + AR.js（A-Frame版） -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    /* 上部ガイド */
    .hud {
      position: fixed;
      left: 12px; right: 12px; top: 12px;
      padding: 14px 14px;
      border-radius: 14px;
      color: #fff;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      z-index: 9999;
      line-height: 1.35;
    }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 13px;
    }
    .ok { background: rgba(0,200,120,0.25); }
    .wait { background: rgba(255,160,0,0.25); }
    .small { opacity: .9; font-size: 13px; }
  </style>
</head>

<body>
  <div class="hud">
    <div class="row">
      <div><strong>手順：</strong>カメラ許可 → 壁の「水龍神マーカー」を映してください</div>
      <div id="status" class="badge wait">WAIT</div>
    </div>
    <div class="small">表示中：<span id="step">-</span></div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true; precision: medium;"
    arjs="
      sourceType: webcam;
      debugUIEnabled: false;
      trackingMethod: best;
    "
  >
    <a-assets>
      <!-- キャッシュ対策：更新時に v を変えてください -->
      <img id="img1" src="./step1.png?v=20260303-1" crossorigin="anonymous">
      <img id="img2" src="./step2.png?v=20260303-1" crossorigin="anonymous">
      <img id="img3" src="./step3.png?v=20260303-1" crossorigin="anonymous">
    </a-assets>

    <!-- マーカー：pattern-marker.patt が“認識の本体” -->
    <a-marker
      id="marker"
      type="pattern"
      url="./pattern-marker.patt?v=20260303-1"
    >
      <!-- 壁貼り前提：基本はこの向きでOK（真上から見える場合は下の rotation を調整） -->
      <a-entity id="contentRoot" position="0 0 0" rotation="0 0 0">

        <!-- ① -->
        <a-image
          id="step1"
          src="#img1"
          position="0 0 0.01"
          rotation="0 0 0"
          width="1.2"
          height="1.2"
          material="transparent:true; opacity:0; side:double;"
          animation__fadein="property: material.opacity; to: 1; dur: 900; startEvents: show"
          animation__fadeout="property: material.opacity; to: 0; dur: 900; startEvents: hide"
        ></a-image>

        <!-- ② -->
        <a-image
          id="step2"
          src="#img2"
          position="0 0 0.011"
          rotation="0 0 0"
          width="1.2"
          height="1.2"
          material="transparent:true; opacity:0; side:double;"
          animation__fadein="property: material.opacity; to: 1; dur: 900; startEvents: show"
          animation__fadeout="property: material.opacity; to: 0; dur: 900; startEvents: hide"
        ></a-image>

        <!-- ③ -->
        <a-image
          id="step3"
          src="#img3"
          position="0 0 0.012"
          rotation="0 0 0"
          width="1.2"
          height="1.2"
          material="transparent:true; opacity:0; side:double;"
          animation__fadein="property: material.opacity; to: 1; dur: 900; startEvents: show"
          animation__fadeout="property: material.opacity; to: 0; dur: 900; startEvents: hide"
        ></a-image>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    (function () {
      const marker = document.getElementById('marker');

      const statusEl = document.getElementById('status');
      const stepEl = document.getElementById('step');

      const s1 = document.getElementById('step1');
      const s2 = document.getElementById('step2');
      const s3 = document.getElementById('step3');

      const STEPS = [s1, s2, s3];

      let timer = null;
      let running = false;
      let index = 0;

      function setStatus(found) {
        statusEl.textContent = found ? 'FOUND' : 'WAIT';
        statusEl.classList.toggle('ok', found);
        statusEl.classList.toggle('wait', !found);
      }

      function hideAllImmediately() {
        STEPS.forEach(el => {
          el.setAttribute('material', 'opacity', 0);
        });
      }

      function fadeTo(i) {
        // i: 0,1,2
        STEPS.forEach((el, idx) => {
          if (idx === i) {
            el.emit('show');
          } else {
            el.emit('hide');
          }
        });
        stepEl.textContent = String(i + 1);
      }

      function startSequence() {
        if (running) return;
        running = true;
        index = 0;

        // いったん全消し→①表示
        hideAllImmediately();
        fadeTo(index);

        // 3秒ごとに切替（①→②→③）
        timer = setInterval(() => {
          index++;
          if (index >= STEPS.length) {
            // ③で止める（ループしたければここを index=0 にして続ける）
            clearInterval(timer);
            timer = null;
            return;
          }
          fadeTo(index);
        }, 3000);
      }

      function stopSequence() {
        running = false;
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
        stepEl.textContent = '-';
        hideAllImmediately();
      }

      // マーカー検出
      marker.addEventListener('markerFound', () => {
        setStatus(true);
        startSequence();
      });

      // マーカー見失い
      marker.addEventListener('markerLost', () => {
        setStatus(false);
        stopSequence();
      });

      // 初期表示
      setStatus(false);
      hideAllImmediately();
    })();
  </script>
</body>
</html>
