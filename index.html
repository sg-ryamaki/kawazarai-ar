<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>kawazarai-ar</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;
      font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif}

    /* カメラ映像 */
    #bgVideo{
      position:fixed;inset:0;width:100%;height:100%;
      object-fit:cover;z-index:0;
    }
    /* AR オーバーレイ canvas */
    #arCanvas{
      position:fixed;inset:0;width:100%;height:100%;
      z-index:1;pointer-events:none;
    }
    /* AR コンテンツ（step画像）オーバーレイ */
    #arContent{
      position:fixed;inset:0;z-index:2;pointer-events:none;
      display:flex;align-items:center;justify-content:center;
    }
    #stepImg{
      max-width:70vw;max-height:70vh;
      border-radius:12px;
      box-shadow:0 0 32px rgba(0,0,0,.7);
      opacity:0;
      transition:opacity 0.6s ease;
    }
    #stepImg.visible{opacity:1}

    /* HUD */
    #hud{
      position:fixed;
      top:env(safe-area-inset-top);
      left:env(safe-area-inset-left);
      right:env(safe-area-inset-right);
      padding:12px;z-index:10;
      pointer-events:none;color:#fff;
    }
    #panel{
      display:inline-block;max-width:92vw;
      background:rgba(0,0,0,.55);
      border-radius:14px;padding:12px 14px;
    }
    #panelTitle{font-weight:800;font-size:18px;margin-bottom:6px}
    #panelDesc{font-size:14px;line-height:1.5;opacity:.95;margin-bottom:8px}
    #pillRow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .pill{padding:6px 12px;border-radius:999px;font-weight:800;font-size:14px}
    #pillState{background:#8a5a00}
    #pillShowing{background:#0b6b3a;display:none}
    #metaRow{margin-top:6px;font-size:12px;opacity:.85}

    /* ガイド枠 */
    #guideWrap{
      position:fixed;inset:0;
      display:flex;align-items:center;justify-content:center;
      z-index:9;pointer-events:none;
    }
    #guide{
      width:min(84vw,500px);aspect-ratio:1/1;
      border:4px dashed rgba(255,255,255,.75);border-radius:22px;
    }
    #guideHint{
      position:fixed;left:50%;transform:translateX(-50%);
      bottom:calc(env(safe-area-inset-bottom) + 18px);
      z-index:9;color:#fff;background:rgba(0,0,0,.45);
      padding:8px 12px;border-radius:999px;
      font-size:12px;white-space:nowrap;pointer-events:none;
    }

    /* START オーバーレイ */
    #startOverlay{
      position:fixed;inset:0;z-index:20;
      display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.85);color:#fff;padding:20px;
    }
    #startOverlay.hidden{display:none}
    #startCard{
      width:min(92vw,520px);
      background:rgba(20,20,20,.92);
      border:1px solid rgba(255,255,255,.18);
      border-radius:16px;padding:20px 18px;text-align:center;
    }
    #startCard h2{font-size:18px;margin-bottom:10px}
    #startCard p{font-size:13px;opacity:.9;line-height:1.7;margin-bottom:16px}
    #startBtn{
      appearance:none;border:none;
      padding:14px 32px;border-radius:12px;
      font-weight:900;font-size:17px;
      background:#0b4f9a;color:#fff;
      cursor:pointer;touch-action:manipulation;
    }
    #startBtn:disabled{background:#444}
    #startErr{
      margin-top:14px;font-size:12px;color:#ffb3b3;
      white-space:pre-wrap;text-align:left;display:none;
    }
    #retryBtn{
      display:none;margin-top:10px;
      appearance:none;border:none;
      padding:10px 18px;border-radius:10px;
      font-weight:800;font-size:14px;
      background:#555;color:#fff;
      cursor:pointer;touch-action:manipulation;
    }
  </style>
</head>
<body>

<!-- カメラ映像 -->
<video id="bgVideo" playsinline webkit-playsinline muted autoplay></video>

<!-- AR 検出デバッグ canvas（マーカー枠描画用） -->
<canvas id="arCanvas"></canvas>

<!-- step 画像表示エリア -->
<div id="arContent">
  <img id="stepImg" src="" alt=""/>
</div>

<!-- HUD -->
<div id="hud">
  <div id="panel">
    <div id="panelTitle">手順：</div>
    <div id="panelDesc">マーカーをガイド枠に入れてください</div>
    <div id="pillRow">
      <span id="pillState" class="pill">WAIT</span>
      <span id="pillShowing" class="pill">表示中：<span id="showingNum">-</span></span>
    </div>
    <div id="metaRow" id="metaRow">
      <span id="metaCam">camera: -</span>
    </div>
  </div>
</div>

<div id="guideWrap"><div id="guide"></div></div>
<div id="guideHint">※ マーカーをできるだけ大きく、ピントが合う距離で</div>

<!-- START オーバーレイ -->
<div id="startOverlay">
  <div id="startCard">
    <h2>📷 ARを開始します</h2>
    <p>
      ボタンをタップしてカメラを起動してください。<br>
      「カメラへのアクセスを求めています」が出たら<br>
      <b>「許可」</b>を選択してください。<br><br>
      起動後、<b>マーカー（稲妻マーク）</b>をカメラに映してください。
    </p>
    <button id="startBtn">▶ START</button>
    <button id="retryBtn">🔄 リトライ</button>
    <div id="startErr"></div>
  </div>
</div>

<!-- AR.js (jsartoolkit5 ベース・A-Frameなし) -->
<script src="https://cdn.jsdelivr.net/gh/nicktindall/cyclon.p2p-rtc-client@master/tests/vendor/three.min.js"></script>
<script>
// ── Three.js を使わずに AR.js の jsartoolkit5 だけ使う ──
// jsartoolkit5 の UMD ビルドを直接ロード
</script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex.js" onerror="window._arjsLoadError=true"></script>

<script>
(function(){
'use strict';

// ─────────────────────────────────────────────
//  要素取得
// ─────────────────────────────────────────────
const bgVideo      = document.getElementById('bgVideo');
const arCanvas     = document.getElementById('arCanvas');
const stepImg      = document.getElementById('stepImg');
const startOverlay = document.getElementById('startOverlay');
const startBtn     = document.getElementById('startBtn');
const retryBtn     = document.getElementById('retryBtn');
const startErr     = document.getElementById('startErr');
const pillState    = document.getElementById('pillState');
const pillShowing  = document.getElementById('pillShowing');
const showingNum   = document.getElementById('showingNum');
const metaCam      = document.getElementById('metaCam');

const STEP_IMAGES  = ['step1.png','step2.png','step3.png'];
const STEP_INTERVAL = 3000; // ms

let stepIndex = 0;
let stepTimer = null;
let markerFound = false;

// ─────────────────────────────────────────────
//  ステップ表示
// ─────────────────────────────────────────────
function showStep(i) {
  stepIndex = i;
  showingNum.textContent = String(i + 1);
  pillShowing.style.display = 'inline-block';
  stepImg.classList.remove('visible');
  // 少し待ってフェードイン
  setTimeout(() => {
    stepImg.src = STEP_IMAGES[i];
    stepImg.classList.add('visible');
  }, 50);
}

function startStepLoop() {
  stopStepLoop();
  showStep(0);
  stepTimer = setInterval(() => {
    if (markerFound) showStep((stepIndex + 1) % STEP_IMAGES.length);
  }, STEP_INTERVAL);
}

function stopStepLoop() {
  if (stepTimer) { clearInterval(stepTimer); stepTimer = null; }
}

function onMarkerFound() {
  markerFound = true;
  pillState.textContent = 'FOUND';
  pillState.style.background = '#0b4f9a';
  startStepLoop();
}

function onMarkerLost() {
  markerFound = false;
  pillState.textContent = 'WAIT';
  pillState.style.background = '#8a5a00';
  pillShowing.style.display = 'none';
  stepImg.classList.remove('visible');
  stopStepLoop();
}

// ─────────────────────────────────────────────
//  AR 処理（jsartoolkit5 直接利用）
// ─────────────────────────────────────────────
let arController = null;
let arContext    = null;
let rafId        = null;
let lastFound    = false;

async function initAR(stream) {
  bgVideo.srcObject = stream;
  bgVideo.muted     = true;
  bgVideo.setAttribute('playsinline','');
  bgVideo.setAttribute('webkit-playsinline','');
  await bgVideo.play();

  // video サイズ確定を待つ
  await new Promise(resolve => {
    if (bgVideo.videoWidth) { resolve(); return; }
    bgVideo.addEventListener('loadedmetadata', resolve, {once:true});
  });

  const vw = bgVideo.videoWidth;
  const vh = bgVideo.videoHeight;
  metaCam.textContent = `camera: OK (${vw}x${vh})`;

  // canvas を video サイズに合わせる
  arCanvas.width  = vw;
  arCanvas.height = vh;

  // ── AR.js (THREEx) が使えるか確認 ──
  if (window._arjsLoadError || typeof THREEx === 'undefined') {
    // AR.js 読み込み失敗 → 簡易フォールバック（輝度差検出）
    console.warn('AR.js unavailable, using fallback detection');
    startFallbackDetection(vw, vh);
    return;
  }

  // ── AR.js ArToolkitSource / Context 初期化 ──
  arContext = new THREEx.ArToolkitContext({
    cameraParametersUrl : 'https://raw.githack.com/AR-js-org/AR.js/master/data/data/camera_para.dat',
    detectionMode       : 'mono',
    imageSmoothingEnabled: false,
  });

  await new Promise(resolve => arContext.init(resolve));

  arController = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
  // 既存 stream を直接差し込む（getUserMedia を二重に呼ばない）
  arController._domElement = bgVideo;

  // マーカー追跡
  const markerControls = new THREEx.ArMarkerControls(arContext, new THREE.Object3D(), {
    type            : 'pattern',
    patternUrl      : 'pattern-marker.patt',
    changeMatrixMode: 'cameraTransformMatrix',
  });

  // ダミー Three.js シーン（レンダリングには使わない）
  const renderer = { domElement: arCanvas };
  const scene    = new THREE.Scene();
  const camera   = new THREE.Camera();
  scene.add(camera);
  scene.add(markerControls.object3d);

  let prevVisible = false;

  function tick() {
    rafId = requestAnimationFrame(tick);
    arContext.update(bgVideo);

    const visible = markerControls.object3d.visible;
    if (visible && !prevVisible) onMarkerFound();
    if (!visible && prevVisible) onMarkerLost();
    prevVisible = visible;
  }
  tick();
}

// ─────────────────────────────────────────────
//  フォールバック検出（AR.js 読み込み失敗時）
//  canvas に動画フレームを描いて「黒枠の正方形」を検出
// ─────────────────────────────────────────────
function startFallbackDetection(vw, vh) {
  const ctx = arCanvas.getContext('2d');
  let prevDetected = false;
  let noDetectCount = 0;

  function detect() {
    rafId = requestAnimationFrame(detect);
    ctx.drawImage(bgVideo, 0, 0, vw, vh);
    const data = ctx.getImageData(0, 0, vw, vh).data;

    // 簡易輝度ヒストグラム：白黒比率でマーカーらしさを判定
    let black = 0, white = 0;
    const step = 8; // 全ピクセルは重いのでステップサンプリング
    for (let i = 0; i < data.length; i += 4 * step) {
      const lum = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
      if (lum < 80)  black++;
      else if (lum > 180) white++;
    }
    const total = black + white;
    const blackRatio = total > 0 ? black / total : 0;

    // 黒が 15〜45% のとき「マーカーらしい」と判定
    const detected = blackRatio > 0.15 && blackRatio < 0.45;

    if (detected) {
      noDetectCount = 0;
      if (!prevDetected) onMarkerFound();
    } else {
      noDetectCount++;
      if (prevDetected && noDetectCount > 10) onMarkerLost();
    }
    prevDetected = detected && noDetectCount === 0;
  }
  detect();
}

// ─────────────────────────────────────────────
//  START ボタン
// ─────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  startErr.style.display = 'none';
  retryBtn.style.display = 'none';
  startBtn.disabled      = true;
  startBtn.textContent   = '起動中…';

  try {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: {ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} },
        audio: false
      });
    } catch (_) {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    }

    await initAR(stream);
    startOverlay.classList.add('hidden');

  } catch(e) {
    startBtn.disabled    = false;
    startBtn.textContent = '▶ START';
    retryBtn.style.display = 'inline-block';
    startErr.style.display = 'block';
    const msgs = {
      NotAllowedError:  'カメラの使用が拒否されました。\n「設定」→「Safari」→「カメラ」を「許可」にして再読み込みしてください。',
      NotFoundError:    'カメラが見つかりません。他のアプリがカメラを占有していないか確認してください。',
      NotReadableError: 'カメラにアクセスできません。Safariを完全に終了して再度お試しください。',
    };
    startErr.textContent = msgs[e.name] || ('エラー: ' + (e.message || String(e)));
  }
});

retryBtn.addEventListener('click', () => location.reload());

})();
</script>
</body>
</html>
