<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>水龍神AR（標準レンズ固定）</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{margin:0;overflow:hidden;font-family:sans-serif;}
.ui{
position:fixed;left:12px;right:12px;top:12px;
background:rgba(0,0,0,.6);color:#fff;padding:10px 12px;
border-radius:12px;z-index:10;
}
</style>

<script>
/* === 標準レンズを選ぶ処理 === */
async function selectMainCamera() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  const cams = devices.filter(d => d.kind === "videoinput");

  // 広角っぽい名前を除外（機種差あるため複数ワード）
  const main = cams.find(d =>
    !/wide|ultra|0\.6|super/i.test(d.label)
  );

  return main ? main.deviceId : null;
}

window.addEventListener("load", async () => {
  const deviceId = await selectMainCamera();

  const scene = document.querySelector("a-scene");
  scene.setAttribute("arjs", `
    sourceType: webcam;
    debugUIEnabled: false;
    sourceWidth: 1280;
    sourceHeight: 720;
    displayWidth: 1280;
    displayHeight: 720;
    deviceId: ${deviceId || ""}
  `);
});
</script>
</head>

<body>

<div class="ui">
標準レンズを使用します（SO-51A対策）
</div>

<a-scene embedded vr-mode-ui="enabled:false"
renderer="precision: medium; antialias: true;">

<a-assets>
<img id="img1" src="step1.png" />
<img id="img2" src="step2.png" />
<img id="img3" src="step3.png" />
</a-assets>

<a-marker type="pattern"
url="https://sg-ryamaki.github.io/kawazarai-ar/pattern-marker.patt">

<a-entity position="0 1 1">

<a-plane id="p1" width="1.9" height="3.1"
material="src:#img1; transparent:true;"></a-plane>

<a-plane id="p2" width="1.9" height="3.1"
material="src:#img2; transparent:true; opacity:0;"></a-plane>

<a-plane id="p3" width="1.9" height="3.1"
material="src:#img3; transparent:true; opacity:0;"></a-plane>

</a-entity>
</a-marker>

<a-entity camera></a-entity>
</a-scene>

</body>
</html>
