<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>kawazarai-ar</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;
      font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif}
    #bgVideo{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
    #procCanvas{display:none}
    #stepImg{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      max-width:75vw;max-height:75vh;border-radius:14px;
      box-shadow:0 0 40px rgba(0,0,0,.8);z-index:5;
      opacity:0;transition:opacity 0.5s ease;pointer-events:none;
    }
    #stepImg.visible{opacity:1}
    #hud{
      position:fixed;top:env(safe-area-inset-top);
      left:env(safe-area-inset-left);right:env(safe-area-inset-right);
      padding:12px;z-index:10;pointer-events:none;color:#fff;
    }
    #panel{display:inline-block;max-width:92vw;background:rgba(0,0,0,.55);border-radius:14px;padding:12px 14px}
    #panelTitle{font-weight:800;font-size:18px;margin-bottom:6px}
    #panelDesc{font-size:14px;line-height:1.5;opacity:.95;margin-bottom:8px}
    #pillRow{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .pill{padding:6px 12px;border-radius:999px;font-weight:800;font-size:14px}
    #pillState{background:#8a5a00}
    #pillShowing{background:#0b6b3a;display:none}
    #metaRow{margin-top:6px;font-size:11px;opacity:.85}
    #guideWrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9;pointer-events:none}
    #guide{width:min(80vw,460px);aspect-ratio:1/1;border:4px dashed rgba(255,255,255,.75);border-radius:22px}
    #guideHint{
      position:fixed;left:50%;transform:translateX(-50%);
      bottom:calc(env(safe-area-inset-bottom)+18px);
      z-index:9;color:#fff;background:rgba(0,0,0,.45);
      padding:8px 12px;border-radius:999px;font-size:12px;white-space:nowrap;pointer-events:none;
    }
    #startOverlay{
      position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.85);color:#fff;padding:20px;
    }
    #startOverlay.hidden{display:none}
    #startCard{
      width:min(92vw,520px);background:rgba(20,20,20,.92);
      border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:20px 18px;text-align:center;
    }
    #startCard h2{font-size:18px;margin-bottom:10px}
    #startCard p{font-size:13px;opacity:.9;line-height:1.7;margin-bottom:16px}
    #startBtn{
      appearance:none;border:none;padding:14px 32px;border-radius:12px;
      font-weight:900;font-size:17px;background:#0b4f9a;color:#fff;
      cursor:pointer;touch-action:manipulation;
    }
    #startBtn:disabled{background:#444}
    #startErr{margin-top:14px;font-size:12px;color:#ffb3b3;white-space:pre-wrap;text-align:left;display:none}
    #retryBtn{
      display:none;margin-top:10px;appearance:none;border:none;
      padding:10px 18px;border-radius:10px;font-weight:800;font-size:14px;
      background:#555;color:#fff;cursor:pointer;touch-action:manipulation;
    }
  </style>
</head>
<body>
<video id="bgVideo" playsinline webkit-playsinline muted autoplay></video>
<canvas id="procCanvas"></canvas>
<img id="stepImg" src="" alt=""/>

<div id="hud">
  <div id="panel">
    <div id="panelTitle">手順：</div>
    <div id="panelDesc">龍のマーカーをガイド枠いっぱいに映してください</div>
    <div id="pillRow">
      <span id="pillState" class="pill">WAIT</span>
      <span id="pillShowing" class="pill">表示中：<span id="showingNum">-</span></span>
    </div>
    <div id="metaRow"><span id="metaDbg">起動待ち</span></div>
  </div>
</div>
<div id="guideWrap"><div id="guide"></div></div>
<div id="guideHint">※ 龍のマーカー全体をガイド枠に収めてください</div>

<div id="startOverlay">
  <div id="startCard">
    <h2>📷 ARを開始します</h2>
    <p>
      ボタンをタップしてカメラを起動してください。<br>
      「カメラへのアクセスを求めています」が出たら<br>
      <b>「許可」</b>を選択してください。<br><br>
      起動後、<b>龍のマーカー全体</b>をガイド枠に映してください。
    </p>
    <button id="startBtn">▶ START</button>
    <button id="retryBtn">🔄 リトライ</button>
    <div id="startErr"></div>
  </div>
</div>

// ── コサイン類似度 ──
function cosineSim(a,b){
  let dot=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){dot+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}
  return dot/(Math.sqrt(na)*Math.sqrt(nb)+1e-9);
}

// ── 32×32グリッドで特徴量抽出 ──
function extractFeature(data,sw,sh){
  const m=0.10, x0=Math.floor(sw*m), y0=Math.floor(sh*m);
  const rw=sw-x0*2, rh=sh-y0*2;
  const zones=new Float32Array(1024);
  for(let zy=0;zy<32;zy++){
    for(let zx=0;zx<32;zx++){
      const px0=x0+Math.floor(zx*rw/32), py0=y0+Math.floor(zy*rh/32);
      const px1=x0+Math.floor((zx+1)*rw/32), py1=y0+Math.floor((zy+1)*rh/32);
      let sum=0,cnt=0;
      for(let y=py0;y<py1;y+=2){
        for(let x=px0;x<px1;x+=2){
          const i=(y*sw+x)*4;
          sum+=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
          cnt++;
        }
      }
      zones[zy*32+zx]=cnt>0?sum/cnt/255:0;
    }
  }
  // 正規化
  let mn=1,mx=0;
  for(let i=0;i<1024;i++){if(zones[i]<mn)mn=zones[i];if(zones[i]>mx)mx=zones[i];}
  const rng=mx-mn+1e-9;
  const norm=new Float32Array(1024);
  for(let i=0;i<1024;i++) norm[i]=(zones[i]-mn)/rng;
  return norm;
}

// ── 追加検証：暗領域の分布チェック ──
// 龍マーカーは「下半分に黒が集中、上半分は白が多い」特徴を持つ
function verifyDarkDistribution(data,sw,sh){
  const m=0.10, x0=Math.floor(sw*m), y0=Math.floor(sh*m);
  const rw=sw-x0*2, rh=sh-y0*2;
  const THR=100; // 暗ピクセルの輝度閾値
  let topDark=0,botDark=0,total=0;
  const STEP=3;
  for(let y=y0;y<y0+rh;y+=STEP){
    for(let x=x0;x<x0+rw;x+=STEP){
      const i=(y*sw+x)*4;
      const lum=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
      total++;
      if(lum<THR){
        if(y<y0+rh*0.5) topDark++;
        else botDark++;
      }
    }
  }
  if(total===0) return false;
  const topR=topDark/total, botR=botDark/total;
  // 龍は下半分の方が暗い、かつ全体的に暗領域が15〜60%
  const totalDark=(topDark+botDark)/total;
  return totalDark>0.10 && totalDark<0.65 && botR>topR*0.8;
}

function showStep(i){stepIndex=i;showingNum.textContent=String(i+1);pillShowing.style.display='inline-block';stepImg.classList.remove('visible');setTimeout(()=>{stepImg.src=STEP_IMAGES[i];stepImg.classList.add('visible');},60);}
function startStepLoop(){stopStepLoop();showStep(0);stepTimer=setInterval(()=>{if(isFound)showStep((stepIndex+1)%STEP_IMAGES.length);},STEP_INTERVAL);}
function stopStepLoop(){if(stepTimer){clearInterval(stepTimer);stepTimer=null;}}

function onMarkerLost(){if(!isFound)return;isFound=false;pillState.textContent='WAIT';pillState.style.background='#8a5a00';pillShowing.style.display='none';stepImg.classList.remove('visible');stopStepLoop();}

function detectMarker(){
  requestAnimationFrame(detectMarker);
  frameCount++;
  if(frameCount%3!==0) return;

  procCtx.drawImage(bgVideo,0,0,SCAN_W,SCAN_H);
  const data=procCtx.getImageData(0,0,SCAN_W,SCAN_H).data;

  // 32×32 特徴量で照合
  const feat=extractFeature(data,SCAN_W,SCAN_H);
  let maxSim=0;
  for(const ref of MARKER_FEATURES){
    const s=cosineSim(feat,ref);
    if(s>maxSim) maxSim=s;
  }

  // 類似度が閾値超え かつ 暗領域分布が龍らしい → 二重確認
  const simOk=maxSim>=SIM_THR;
  const distOk=simOk?verifyDarkDistribution(data,SCAN_W,SCAN_H):false;
  const detected=simOk&&distOk;

  if(frameCount%15===0){
    metaDbg.textContent=`類似度: ${(maxSim*100).toFixed(1)}% (閾値:${(SIM_THR*100).toFixed(1)}%)`;
  }

  if(detected){foundCount++;lostCount=0;if(foundCount>=FOUND_NEED)onMarkerFound();}
  else{lostCount++;foundCount=0;if(lostCount>=LOST_NEED)onMarkerLost();}
}

async function startAR(stream){
  bgVideo.srcObject=stream;bgVideo.muted=true;
  await bgVideo.play();
  await new Promise(r=>{if(bgVideo.videoWidth){r();return;}bgVideo.addEventListener('loadedmetadata',r,{once:true});});
  metaDbg.textContent=`camera: ${bgVideo.videoWidth}x${bgVideo.videoHeight}`;
  procCanvas.width=SCAN_W;procCanvas.height=SCAN_H;
  procCtx=procCanvas.getContext('2d',{willReadFrequently:true});
  detectMarker();
}

startBtn.addEventListener('click',async()=>{
  startErr.style.display='none';retryBtn.style.display='none';
  startBtn.disabled=true;startBtn.textContent='起動中…';
  try{
    let stream;
    try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});}
    catch(_){stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});}
    await startAR(stream);
    startOverlay.classList.add('hidden');
  }catch(e){
    startBtn.disabled=false;startBtn.textContent='▶ START';
    retryBtn.style.display='inline-block';startErr.style.display='block';
    const msgs={NotAllowedError:'カメラの使用が拒否されました。\n「設定」→「Safari」→「カメラ」を「許可」にして再読み込みしてください。',NotFoundError:'カメラが見つかりません。',NotReadableError:'カメラにアクセスできません。Safariを完全に終了して再試行してください。'};
    startErr.textContent=msgs[e.name]||('エラー: '+(e.message||String(e)));
  }
});
retryBtn.addEventListener('click',()=>location.reload());
})();
</script>
