<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Water Dragon WebAR</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      background: #000;
    }

    #bgVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      z-index: 1;
    }

    /* 画像をできるだけ画面全体に大きく表示 */
    #stepImg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .22s ease;
      pointer-events: none;
      z-index: 20;
    }

    #stepImg.visible {
      opacity: 1;
    }

    #guide {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .guide-box {
      width: min(82vw, 82vh, 430px);
      aspect-ratio: 1 / 1;
      border: 3px solid rgba(255,255,255,.92);
      border-radius: 18px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.16);
      position: relative;
    }

    .guide-box::before,
    .guide-box::after {
      content: "";
      position: absolute;
      border-radius: 12px;
    }

    .guide-box::before {
      inset: 12px;
      border: 2px dashed rgba(255,255,255,.28);
    }

    .guide-box::after {
      inset: 34px;
      border: 1px solid rgba(255,255,255,.18);
    }

    /* 開始前は START ボタンのみ */
    #overlay {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background: linear-gradient(to bottom, rgba(0,0,0,.35), rgba(0,0,0,.55));
    }

    #overlay.hidden {
      display: none;
    }

    .panel {
      width: auto;
      min-width: 180px;
      border-radius: 18px;
      background: rgba(17,17,17,.88);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
      color: #fff;
      padding: 28px 24px;
      box-sizing: border-box;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 14px;
      background: #0b4f9a;
      color: #fff;
      padding: 14px 32px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      min-width: 120px;
    }

    .btn:disabled {
      opacity: .6;
      cursor: default;
    }

    #retryBtn {
      margin-top: 12px;
      background: #5a5a5a;
      display: none;
    }

    #errorText {
      margin-top: 14px;
      white-space: pre-wrap;
      text-align: left;
      font-size: 13px;
      line-height: 1.6;
      color: #ffd0d0;
      display: none;
      max-width: 320px;
    }

    #procCanvas {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="bgVideo" playsinline webkit-playsinline muted></video>
    <img id="stepImg" alt="AR content">

    <div id="guide">
      <div class="guide-box"></div>
    </div>

    <div id="overlay">
      <div class="panel">
        <button id="startBtn" class="btn">START</button>
        <button id="retryBtn" class="btn">再試行</button>
        <div id="errorText"></div>
      </div>
    </div>

    <canvas id="procCanvas" width="200" height="150"></canvas>
  </div>

  <script>
    (() => {
      'use strict';

      const STEP_IMAGES = ['step1.png', 'step2.png', 'step3.png', 'step4.png'];
      const STEP_DURATIONS = [4000, 3000, 3000, 3000];

      const SCAN_W = 200;
      const SCAN_H = 150;

      // 少し離れても拾いやすい設定
      const FOUND_NEED = 4;
      const LOST_NEED = 10;

      const bgVideo = document.getElementById('bgVideo');
      const stepImg = document.getElementById('stepImg');
      const overlay = document.getElementById('overlay');
      const startBtn = document.getElementById('startBtn');
      const retryBtn = document.getElementById('retryBtn');
      const errorText = document.getElementById('errorText');
      const procCanvas = document.getElementById('procCanvas');
      const procCtx = procCanvas.getContext('2d', { willReadFrequently: true });

      let stream = null;
      let started = false;
      let isFound = false;
      let foundCount = 0;
      let lostCount = 0;
      let stepIndex = 0;
      let stepTimer = null;
      let frameCount = 0;

      function preloadImages() {
        STEP_IMAGES.forEach(src => {
          const img = new Image();
          img.src = src;
        });
      }

      function showStep(i) {
        stepIndex = i;
        stepImg.classList.remove('visible');

        setTimeout(() => {
          stepImg.src = STEP_IMAGES[i];
          stepImg.classList.add('visible');
        }, 50);
      }

      function stopStepLoop() {
        if (stepTimer) {
          clearTimeout(stepTimer);
          stepTimer = null;
        }
      }

      function scheduleNextStep() {
        stopStepLoop();
        if (!isFound) return;

        const duration = STEP_DURATIONS[stepIndex] || 3000;
        stepTimer = setTimeout(() => {
          if (!isFound) return;
          const next = (stepIndex + 1) % STEP_IMAGES.length;
          showStep(next);
          scheduleNextStep();
        }, duration);
      }

      function startStepLoop() {
        stopStepLoop();
        showStep(0);
        scheduleNextStep();
      }

      function resetDisplay() {
        stopStepLoop();
        stepImg.classList.remove('visible');
      }

      function onMarkerFound() {
        if (isFound) return;
        isFound = true;
        startStepLoop();
      }

      function onMarkerLost() {
        if (!isFound) return;
        isFound = false;
        resetDisplay();
      }

      async function startCamera() {
        startBtn.disabled = true;
        retryBtn.style.display = 'none';
        errorText.style.display = 'none';
        errorText.textContent = '';

        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error('このブラウザはカメラAPIに十分対応していません。');
          }

          const constraintsList = [
            {
              video: {
                facingMode: { ideal: 'environment' },
                width: { ideal: 1280 },
                height: { ideal: 720 }
              },
              audio: false
            },
            {
              video: {
                facingMode: 'environment'
              },
              audio: false
            },
            {
              video: true,
              audio: false
            }
          ];

          let lastError = null;

          for (const constraints of constraintsList) {
            try {
              stream = await navigator.mediaDevices.getUserMedia(constraints);
              break;
            } catch (err) {
              lastError = err;
            }
          }

          if (!stream) {
            throw lastError || new Error('カメラを起動できませんでした。');
          }

          bgVideo.srcObject = stream;
          bgVideo.setAttribute('playsinline', '');
          bgVideo.setAttribute('webkit-playsinline', '');
          bgVideo.muted = true;
          await bgVideo.play();

          overlay.classList.add('hidden');
          started = true;
          foundCount = 0;
          lostCount = 0;
          isFound = false;
        } catch (err) {
          console.error(err);
          errorText.style.display = 'block';
          errorText.textContent =
            'カメラを起動できませんでした。\n' +
            '・Safari / Chrome で開いているか\n' +
            '・GitHub Pages の URL で開いているか\n' +
            '・カメラ権限を許可しているか\n\n' +
            '詳細: ' + (err && err.message ? err.message : String(err));
          retryBtn.style.display = 'inline-block';
          startBtn.disabled = false;
        }
      }

      function stopCamera() {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }
      }

      function analyzeWindow(data, sw, sh, rect) {
        const x0 = Math.max(0, Math.floor(rect.x));
        const y0 = Math.max(0, Math.floor(rect.y));
        const rw = Math.min(sw - x0, Math.floor(rect.w));
        const rh = Math.min(sh - y0, Math.floor(rect.h));

        if (rw < 20 || rh < 20) return null;

        const tx0 = x0 + Math.floor(rw * 0.18);
        const ty0 = y0 + Math.floor(rh * 0.15);
        const trw = Math.floor(rw * 0.64);
        const trh = Math.floor(rh * 0.60);

        let total = 0;
        let whiteCount = 0;
        let blackCount = 0;
        let blueCount = 0;

        let textTotal = 0;
        let textDarkCount = 0;

        let borderTotal = 0;
        let borderBlueCount = 0;

        const borderThickness = Math.max(6, Math.floor(Math.min(rw, rh) * 0.10));

        for (let y = y0; y < y0 + rh; y += 2) {
          for (let x = x0; x < x0 + rw; x += 2) {
            const i = (y * sw + x) * 4;
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const lum = 0.299 * r + 0.587 * g + 0.114 * b;

            total++;

            if (lum > 168) whiteCount++;
            if (lum < 105) blackCount++;
            if (b > 90 && b > r + 12 && b > g + 8) blueCount++;

            const nearBorder =
              (x < x0 + borderThickness) ||
              (x > x0 + rw - borderThickness) ||
              (y < y0 + borderThickness) ||
              (y > y0 + rh - borderThickness);

            if (nearBorder) {
              borderTotal++;
              if (b > 90 && b > r + 12 && b > g + 8) borderBlueCount++;
            }

            const inTextArea =
              x >= tx0 && x < tx0 + trw &&
              y >= ty0 && y < ty0 + trh;

            if (inTextArea) {
              textTotal++;
              if (lum < 110) textDarkCount++;
            }
          }
        }

        if (total === 0 || textTotal === 0 || borderTotal === 0) return null;

        return {
          whiteRatio: whiteCount / total,
          blackRatio: blackCount / total,
          blueRatio: blueCount / total,
          textDarkRatio: textDarkCount / textTotal,
          borderBlueRatio: borderBlueCount / borderTotal,
          areaRatio: (rw * rh) / (sw * sh)
        };
      }

      function scoreMarker(m) {
        if (!m) return 0;

        let score = 0;

        if (m.whiteRatio > 0.32 && m.whiteRatio < 0.92) score += 1;
        if (m.blackRatio > 0.025 && m.blackRatio < 0.34) score += 1;
        if (m.textDarkRatio > 0.035 && m.textDarkRatio < 0.48) score += 1;
        if (m.blueRatio > 0.003) score += 1;
        if (m.borderBlueRatio > 0.004) score += 1;
        if (m.areaRatio > 0.10 && m.areaRatio < 0.72) score += 1;

        return score;
      }

      function findBestMarker(data, sw, sh) {
        const windows = [
          { x: sw * 0.10, y: sh * 0.08, w: sw * 0.80, h: sh * 0.80 },
          { x: sw * 0.18, y: sh * 0.12, w: sw * 0.64, h: sh * 0.72 },
          { x: sw * 0.24, y: sh * 0.16, w: sw * 0.52, h: sh * 0.62 }
        ];

        let best = null;
        let bestScore = -1;

        for (const rect of windows) {
          const m = analyzeWindow(data, sw, sh, rect);
          const score = scoreMarker(m);
          if (score > bestScore) {
            bestScore = score;
            best = m;
          }
        }

        return { best, bestScore };
      }

      function detectLoop() {
        requestAnimationFrame(detectLoop);

        if (!started) return;
        if (!bgVideo.videoWidth) return;

        frameCount++;
        if (frameCount % 2 !== 0) return;

        try {
          procCtx.drawImage(bgVideo, 0, 0, SCAN_W, SCAN_H);
          const imageData = procCtx.getImageData(0, 0, SCAN_W, SCAN_H);
          const data = imageData.data;

          const result = findBestMarker(data, SCAN_W, SCAN_H);
          const m = result.best;
          const bestScore = result.bestScore;

          const detected = !!m && bestScore >= 5;

          if (detected) {
            foundCount++;
            lostCount = 0;
            if (foundCount >= FOUND_NEED) onMarkerFound();
          } else {
            lostCount++;
            foundCount = 0;
            if (lostCount >= LOST_NEED) onMarkerLost();
          }

        } catch (err) {
          console.error(err);
        }
      }

      startBtn.addEventListener('click', startCamera);
      retryBtn.addEventListener('click', startCamera);
      window.addEventListener('beforeunload', stopCamera);

      preloadImages();
      detectLoop();
    })();
  </script>
</body>
</html>
