<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <title>Water Dragon WebAR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');
    :root{--water:#5ecfff;--glow:rgba(94,207,255,0.6);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Noto Serif JP',serif;}
    #app{position:fixed;inset:0;background:#000;}
    #bgVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}

    /* ガイド z:10 */
    #guide{position:absolute;inset:0;z-index:10;pointer-events:none;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;}
    .guide-box{width:min(78vw,78vh,400px);aspect-ratio:1/1;position:relative;transition:opacity .3s;}
    .guide-box::before,.guide-box::after,.guide-corner-br,.guide-corner-bl{content:'';position:absolute;width:32px;height:32px;border-color:var(--water);border-style:solid;border-width:0;}
    .guide-box::before{top:0;left:0;border-top-width:3px;border-left-width:3px;border-top-left-radius:6px;animation:cornerPulse 2s ease-in-out infinite;}
    .guide-box::after{top:0;right:0;border-top-width:3px;border-right-width:3px;border-top-right-radius:6px;animation:cornerPulse 2s ease-in-out infinite .5s;}
    .guide-corner-br{bottom:0;right:0;border-bottom-width:3px;border-right-width:3px;border-bottom-right-radius:6px;animation:cornerPulse 2s ease-in-out infinite 1s;}
    .guide-corner-bl{bottom:0;left:0;border-bottom-width:3px;border-left-width:3px;border-bottom-left-radius:6px;animation:cornerPulse 2s ease-in-out infinite 1.5s;}
    .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--water),rgba(94,207,255,.6),transparent);top:0;animation:scanMove 3s linear infinite;opacity:.75;}
    .guide-label{color:rgba(94,207,255,.85);font-size:13px;letter-spacing:.2em;text-shadow:0 0 10px var(--glow);animation:labelBlink 2s ease-in-out infinite;}
    .guide-hidden .guide-box,.guide-hidden .guide-label{opacity:0;}

    /* ARステージ z:20 */
    #arStage{position:absolute;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity .5s ease;}
    #arStage.active{opacity:1;}

    /* 画像レイヤー z:21 — 最背面 */
    #contentWrap{position:absolute;inset:0;z-index:21;display:grid;place-items:center;overflow:hidden;}
    #stepImg{width:100%;height:100%;object-fit:cover;opacity:0;transform:scale(1.06) translateY(10px);transition:opacity .6s ease,transform .75s cubic-bezier(.18,.85,.22,1);}
    #stepImg.visible{opacity:1;transform:scale(1) translateY(0);animation:floatDrift 6s ease-in-out infinite;}

    /* エフェクト全体ラッパー z:30 — 画像より前面 */
    #fxLayer{position:absolute;inset:0;z-index:30;pointer-events:none;}

    /* オーラ */
    #auraLayer{position:absolute;inset:-10%;background:radial-gradient(circle at 50% 52%,rgba(94,207,255,.42) 0%,rgba(94,207,255,.18) 22%,transparent 50%),radial-gradient(circle at 50% 42%,rgba(255,255,255,.22) 0%,rgba(255,255,255,.08) 22%,transparent 44%);filter:blur(10px);mix-blend-mode:screen;animation:auraPulse 4.5s ease-in-out infinite;}

    /* エネルギーリング */
    #energyRings{position:absolute;left:50%;top:50%;width:min(85vw,85vh,460px);aspect-ratio:1/1;transform:translate(-50%,-50%);}
    .ering{position:absolute;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%);animation:ringPulse 4s ease-in-out infinite;}
    .ering:nth-child(1){width:55%;height:55%;border:1.5px solid rgba(94,207,255,.65);animation-delay:0s;}
    .ering:nth-child(2){width:70%;height:70%;border:1.5px solid rgba(94,207,255,.45);animation-delay:.7s;}
    .ering:nth-child(3){width:85%;height:85%;border:1px solid rgba(94,207,255,.30);animation-delay:1.4s;}
    .ering:nth-child(4){width:100%;height:100%;border:1px solid rgba(94,207,255,.18);animation-delay:2.1s;}

    /* 魔法陣 */
    #hexagram{position:absolute;left:50%;top:50%;width:min(88vw,88vh,480px);aspect-ratio:1/1;transform:translate(-50%,-50%);opacity:0;}
    #hexagram svg{width:100%;height:100%;animation:hexaSpin 22s linear infinite;filter:drop-shadow(0 0 8px var(--water)) drop-shadow(0 0 20px rgba(94,207,255,.5));}
    #arStage.active #hexagram{animation:hexaFadeIn .9s .15s forwards;}

    /* 召喚フラッシュ */
    #summonFlash{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.95),rgba(94,207,255,.45) 38%,transparent 68%);opacity:0;}
    #summonFlash.flash{animation:summonBurst .7s ease-out forwards;}

    /* 波紋 */
    #rippleLayer{position:absolute;left:50%;bottom:3%;width:min(75vw,75vh,440px);height:min(22vw,22vh,130px);transform:translateX(-50%);opacity:.85;}
    .ripple{position:absolute;left:50%;bottom:0;border:2px solid rgba(94,207,255,.6);border-radius:50%;transform:translateX(-50%) scale(.55);opacity:0;mix-blend-mode:screen;}
    .r1{width:38%;height:26%;animation:rippleWave 3s linear infinite;}
    .r2{width:58%;height:38%;animation:rippleWave 3s linear infinite .95s;}
    .r3{width:80%;height:52%;animation:rippleWave 3s linear infinite 1.9s;}

    /* パーティクル */
    #sparkleLayer{position:absolute;inset:0;overflow:hidden;mix-blend-mode:screen;}
    .spark{position:absolute;width:9px;height:9px;background:radial-gradient(circle,rgba(255,255,255,1) 0%,rgba(140,230,255,.8) 45%,transparent 72%);border-radius:50%;opacity:0;animation:sparkFloat linear infinite;}
    .drift{position:absolute;width:18px;height:18px;background:radial-gradient(circle,rgba(94,207,255,.7) 0%,transparent 68%);border-radius:50%;opacity:0;animation:driftFloat ease-in-out infinite;}

    /* 光ベール — 最前面の仕上げ */
    #glowVeil{position:absolute;inset:0;background:radial-gradient(circle at 50% 34%,rgba(255,255,255,.20),rgba(255,255,255,.05) 28%,transparent 48%),radial-gradient(circle at 52% 65%,rgba(94,207,255,.18),rgba(94,207,255,.04) 28%,transparent 46%);mix-blend-mode:screen;animation:glowPulse 5s ease-in-out infinite;}

    /* インジケーター z:35 */
    #stepDots{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:9px;z-index:35;pointer-events:none;opacity:0;transition:opacity .4s;}
    #arStage.active #stepDots{opacity:1;}
    .dot{width:9px;height:9px;border-radius:50%;background:rgba(94,207,255,.25);border:1.5px solid rgba(94,207,255,.6);transition:all .35s ease;}
    .dot.on{background:var(--water);box-shadow:0 0 10px var(--water),0 0 20px rgba(94,207,255,.6);transform:scale(1.35);}

    /* HUD装飾 z:25 */
    #hudTL,#hudBR{position:absolute;width:64px;height:64px;z-index:25;pointer-events:none;opacity:.65;}
    #hudTL{top:14px;left:14px;}
    #hudBR{bottom:14px;right:14px;transform:rotate(180deg);}

    /* スタート画面 z:40 */
    #overlay{position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,rgba(0,8,20,.93) 0%,rgba(0,22,50,.90) 100%);}
    #overlay.hidden{display:none;}
    .panel{width:min(340px,94vw);border-radius:22px;background:rgba(0,15,36,.88);border:1px solid rgba(94,207,255,.24);box-shadow:0 0 0 1px rgba(94,207,255,.07),0 0 44px rgba(94,207,255,.14),inset 0 1px 0 rgba(255,255,255,.07);color:#fff;padding:38px 28px 34px;text-align:center;backdrop-filter:blur(14px);position:relative;overflow:hidden;}
    .panel::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(94,207,255,.65),transparent);}
    .panel-icon{font-size:44px;margin-bottom:10px;display:block;filter:drop-shadow(0 0 12px rgba(94,207,255,.65));animation:iconFloat 3s ease-in-out infinite;}
    .panel-title{font-size:20px;font-weight:700;color:var(--water);letter-spacing:.12em;text-shadow:0 0 14px var(--glow);margin-bottom:8px;}
    .panel-sub{font-size:13px;color:rgba(255,255,255,.58);letter-spacing:.04em;margin-bottom:28px;line-height:1.85;}
    .btn{appearance:none;border:none;border-radius:14px;background:linear-gradient(160deg,#1e8fff 0%,#0a5acc 100%);color:#fff;padding:15px 40px;font-size:17px;font-weight:700;font-family:'Noto Serif JP',serif;cursor:pointer;width:100%;letter-spacing:.12em;box-shadow:0 6px 22px rgba(10,90,204,.48),inset 0 1px 0 rgba(255,255,255,.2);transition:transform .15s,box-shadow .15s;}
    .btn:active{transform:scale(.97);}
    .btn:disabled{opacity:.6;cursor:default;}
    #retryBtn{margin-top:10px;background:linear-gradient(160deg,#555 0%,#333 100%);box-shadow:0 4px 14px rgba(0,0,0,.3);display:none;}
    #errorText{margin-top:14px;white-space:pre-wrap;text-align:left;font-size:12px;line-height:1.65;color:#ffb0b0;display:none;font-family:-apple-system,sans-serif;}
    #procCanvas{display:none;}

    @keyframes cornerPulse{0%,100%{opacity:.6;}50%{opacity:1;filter:drop-shadow(0 0 7px var(--water));}}
    @keyframes scanMove{0%{top:0;opacity:0;}5%{opacity:.75;}95%{opacity:.75;}100%{top:100%;opacity:0;}}
    @keyframes labelBlink{0%,100%{opacity:.55;}50%{opacity:.95;}}
    @keyframes summonBurst{0%{opacity:.95;transform:scale(.5);}35%{opacity:.75;}100%{opacity:0;transform:scale(2.4);}}
    @keyframes hexaFadeIn{from{opacity:0;transform:translate(-50%,-50%) scale(.65) rotate(-30deg);}to{opacity:.28;}}
    @keyframes hexaSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    @keyframes auraPulse{0%,100%{transform:scale(.96);opacity:.7;}50%{transform:scale(1.05);opacity:1;}}
    @keyframes ringPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6;}50%{transform:translate(-50%,-50%) scale(1.08);opacity:1;}}
    @keyframes rippleWave{0%{transform:translateX(-50%) scale(.55);opacity:0;}14%{opacity:.65;}100%{transform:translateX(-50%) scale(1.25);opacity:0;}}
    @keyframes sparkFloat{0%{transform:translate3d(0,20px,0) scale(.5);opacity:0;}15%{opacity:1;}85%{opacity:.6;}100%{transform:translate3d(0,-160px,0) scale(1.4);opacity:0;}}
    @keyframes driftFloat{0%{transform:translateY(0) scale(.75);opacity:0;}18%{opacity:.7;}82%{opacity:.4;}100%{transform:translateY(-200px) scale(1.3);opacity:0;}}
    @keyframes floatDrift{0%,100%{transform:scale(1) translateY(0);}40%{transform:scale(1.012) translateY(-8px);}70%{transform:scale(1.02) translateY(-14px);}}
    @keyframes glowPulse{0%,100%{opacity:.5;}50%{opacity:.9;}}
    @keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  </style>
</head>
<body>
<div id="app">
  <video id="bgVideo" playsinline webkit-playsinline muted></video>

  <!-- スキャンガイド -->
  <div id="guide">
    <div class="guide-box">
      <div class="scan-line"></div>
      <div class="guide-corner-br"></div>
      <div class="guide-corner-bl"></div>
    </div>
    <span class="guide-label">マーカーを枠内に合わせてください</span>
  </div>

  <!-- HUD -->
  <svg id="hudTL" viewBox="0 0 64 64" fill="none">
    <path d="M0 22 L0 5 Q0 0 5 0 L22 0" stroke="#5ecfff" stroke-width="2.5"/>
    <circle cx="1" cy="1" r="3.5" fill="#5ecfff" opacity=".6"/>
  </svg>
  <svg id="hudBR" viewBox="0 0 64 64" fill="none">
    <path d="M0 22 L0 5 Q0 0 5 0 L22 0" stroke="#5ecfff" stroke-width="2.5"/>
    <circle cx="1" cy="1" r="3.5" fill="#5ecfff" opacity=".6"/>
  </svg>

  <!-- ARステージ -->
  <div id="arStage">

    <!-- 画像（最背面） -->
    <div id="contentWrap">
      <img id="stepImg" alt="AR content">
    </div>

    <!-- エフェクト群（画像より前面） -->
    <div id="fxLayer">
      <div id="summonFlash"></div>

      <div id="hexagram">
        <svg viewBox="0 0 200 200" fill="none">
          <circle cx="100" cy="100" r="96" stroke="rgba(94,207,255,0.4)" stroke-width="1" stroke-dasharray="5 7"/>
          <polygon points="100,8 122,52 168,52 132,80 148,124 100,96 52,124 68,80 32,52 78,52"
            fill="none" stroke="rgba(94,207,255,0.65)" stroke-width="1.2"/>
          <circle cx="100" cy="100" r="58" stroke="rgba(94,207,255,0.32)" stroke-width=".8" stroke-dasharray="3 5"/>
          <circle cx="100" cy="100" r="10" stroke="rgba(94,207,255,0.55)" stroke-width="1"/>
          <circle cx="100" cy="8"   r="3.5" fill="rgba(94,207,255,0.6)"/>
          <circle cx="100" cy="192" r="3.5" fill="rgba(94,207,255,0.6)"/>
          <circle cx="8"   cy="100" r="3.5" fill="rgba(94,207,255,0.6)"/>
          <circle cx="192" cy="100" r="3.5" fill="rgba(94,207,255,0.6)"/>
          <line x1="100" y1="8"   x2="100" y2="192" stroke="rgba(94,207,255,0.12)" stroke-width=".6"/>
          <line x1="8"   y1="100" x2="192" y2="100" stroke="rgba(94,207,255,0.12)" stroke-width=".6"/>
        </svg>
      </div>

      <div id="auraLayer"></div>

      <div id="energyRings">
        <div class="ering"></div><div class="ering"></div>
        <div class="ering"></div><div class="ering"></div>
      </div>

      <div id="sparkleLayer">
        <div class="spark" style="left:10%;top:78%;animation-duration:5.0s;animation-delay:.0s"></div>
        <div class="spark" style="left:18%;top:82%;animation-duration:5.5s;animation-delay:.7s"></div>
        <div class="spark" style="left:27%;top:74%;animation-duration:4.7s;animation-delay:.3s"></div>
        <div class="spark" style="left:36%;top:85%;animation-duration:5.9s;animation-delay:1.2s"></div>
        <div class="spark" style="left:47%;top:76%;animation-duration:5.2s;animation-delay:.5s"></div>
        <div class="spark" style="left:55%;top:80%;animation-duration:4.8s;animation-delay:1.6s"></div>
        <div class="spark" style="left:64%;top:72%;animation-duration:5.4s;animation-delay:.2s"></div>
        <div class="spark" style="left:73%;top:83%;animation-duration:5.1s;animation-delay:1.0s"></div>
        <div class="spark" style="left:82%;top:77%;animation-duration:5.7s;animation-delay:.8s"></div>
        <div class="spark" style="left:91%;top:81%;animation-duration:4.9s;animation-delay:1.9s"></div>
        <div class="spark" style="left:42%;top:66%;animation-duration:6.1s;animation-delay:2.0s"></div>
        <div class="spark" style="left:58%;top:69%;animation-duration:5.6s;animation-delay:.6s"></div>
        <div class="spark" style="left:30%;top:60%;animation-duration:6.4s;animation-delay:2.8s"></div>
        <div class="spark" style="left:70%;top:63%;animation-duration:5.8s;animation-delay:1.4s"></div>
        <div class="drift" style="left:22%;top:90%;animation-duration:7.2s;animation-delay:.2s"></div>
        <div class="drift" style="left:44%;top:92%;animation-duration:8.0s;animation-delay:2.2s"></div>
        <div class="drift" style="left:66%;top:88%;animation-duration:7.6s;animation-delay:1.0s"></div>
        <div class="drift" style="left:84%;top:91%;animation-duration:8.4s;animation-delay:3.1s"></div>
      </div>

      <div id="glowVeil"></div>

      <div id="rippleLayer">
        <div class="ripple r1"></div>
        <div class="ripple r2"></div>
        <div class="ripple r3"></div>
      </div>
    </div><!-- /fxLayer -->

    <div id="stepDots">
      <div class="dot" data-i="0"></div>
      <div class="dot" data-i="1"></div>
      <div class="dot" data-i="2"></div>
      <div class="dot" data-i="3"></div>
    </div>
  </div><!-- /arStage -->

  <!-- スタート画面 -->
  <div id="overlay">
    <div class="panel">
      <span class="panel-icon">🌊</span>
      <div class="panel-title">水龍神様 AR</div>
      <div class="panel-sub">マーカーをカメラで読み取ると<br>水龍神様が現れます</div>
      <button id="startBtn" class="btn">AR を開始する</button>
      <button id="retryBtn" class="btn">再試行</button>
      <div id="errorText"></div>
    </div>
  </div>

  <canvas id="procCanvas" width="200" height="150"></canvas>
</div>

<script>
(()=>{
'use strict';
const STEP_IMAGES=['step1.png','step2.png','step3.png','step4.png'];
const STEP_DURATIONS=[4000,3500,3500,3500];
const FOUND_NEED=4,LOST_NEED=10,SCAN_W=200,SCAN_H=150;

const bgVideo=document.getElementById('bgVideo');
const stepImg=document.getElementById('stepImg');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');
const retryBtn=document.getElementById('retryBtn');
const errorText=document.getElementById('errorText');
const procCanvas=document.getElementById('procCanvas');
const procCtx=procCanvas.getContext('2d',{willReadFrequently:true});
const arStage=document.getElementById('arStage');
const guide=document.getElementById('guide');
const summonFlash=document.getElementById('summonFlash');
const dots=document.querySelectorAll('.dot');

let stream=null,started=false,isFound=false;
let foundCount=0,lostCount=0,stepIndex=0,stepTimer=null,frameCount=0;

/* ── BGM ── */
// iOSはユーザー操作のコールスタック内でのみ Audio.play() が許可される。
// STARTボタン押下時に一度 play→即pause してオーディオをアンロックし、
// マーカー検出時に resume する方式で対応。
let bgmAudio=null;
let bgmUnlocked=false;

function unlockBGM(){
  // STARTボタンのクリックイベント内（ユーザー操作）で呼ぶ
  if(bgmUnlocked)return;
  bgmAudio=new Audio('bgm.mp3');
  bgmAudio.loop=true;
  bgmAudio.volume=0.55;
  // 一瞬再生して即停止 → iOSのオーディオコンテキストを解除
  const p=bgmAudio.play();
  if(p!==undefined){
    p.then(()=>{
      bgmAudio.pause();
      bgmAudio.currentTime=0;
      bgmUnlocked=true;
    }).catch(()=>{
      // 失敗しても続行（Android等では問題なし）
      bgmUnlocked=true;
    });
  }else{
    bgmAudio.pause();
    bgmAudio.currentTime=0;
    bgmUnlocked=true;
  }
}

function playBGM(){
  if(!bgmAudio)return;
  if(bgmAudio.paused){
    bgmAudio.currentTime=0;
    bgmAudio.volume=0.55;
    bgmAudio.play().catch(()=>{});
  }
}

function stopBGM(){
  if(bgmAudio&&!bgmAudio.paused){
    const fade=setInterval(()=>{
      if(bgmAudio.volume>0.05){bgmAudio.volume=Math.max(0,bgmAudio.volume-0.05);}
      else{bgmAudio.pause();bgmAudio.volume=0.55;clearInterval(fade);}
    },80);
  }
}

/* ── プリロード ── */
function preloadImages(){STEP_IMAGES.forEach(s=>{const i=new Image();i.src=s;});}

/* ── ドット ── */
function updateDots(i){dots.forEach((d,idx)=>d.classList.toggle('on',idx===i));}

/* ── ステップ ── */
function showStep(i){
  stepIndex=i;stepImg.classList.remove('visible');updateDots(i);
  setTimeout(()=>{stepImg.src=STEP_IMAGES[i];stepImg.classList.add('visible');},60);
}
function stopStepLoop(){if(stepTimer){clearTimeout(stepTimer);stepTimer=null;}}
function scheduleNext(){
  stopStepLoop();if(!isFound)return;
  stepTimer=setTimeout(()=>{
    if(!isFound)return;showStep((stepIndex+1)%STEP_IMAGES.length);scheduleNext();
  },STEP_DURATIONS[stepIndex]||3500);
}
function startStepLoop(){stopStepLoop();showStep(0);scheduleNext();}
function resetDisplay(){stopStepLoop();stepImg.classList.remove('visible');updateDots(0);}

/* ── AR表示 ── */
function setARVisible(v){
  if(v){
    arStage.classList.add('active');
    guide.classList.add('guide-hidden');
    summonFlash.classList.remove('flash');
    void summonFlash.offsetWidth;
    summonFlash.classList.add('flash');
    playBGM();
  }else{
    arStage.classList.remove('active');
    guide.classList.remove('guide-hidden');
    stopBGM();
  }
}
function onMarkerFound(){
  if(isFound)return;isFound=true;
  setTimeout(()=>{
    if(!isFound)return; // 1秒以内に外れたらキャンセル
    setARVisible(true);startStepLoop();
  },1000);
}
function onMarkerLost(){if(!isFound)return;isFound=false;setARVisible(false);resetDisplay();}

/* ── カメラ ── */
async function startCamera(){
  unlockBGM();
  startBtn.disabled=true;retryBtn.style.display='none';errorText.style.display='none';
  try{
    if(!navigator.mediaDevices?.getUserMedia)throw new Error('カメラAPIに対応していません。');
    const lists=[
      {video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false},
      {video:{facingMode:'environment'},audio:false},
      {video:true,audio:false}
    ];
    let lastErr=null;
    for(const c of lists){try{stream=await navigator.mediaDevices.getUserMedia(c);break;}catch(e){lastErr=e;}}
    if(!stream)throw lastErr||new Error('カメラを起動できませんでした。');
    bgVideo.srcObject=stream;bgVideo.setAttribute('playsinline','');bgVideo.setAttribute('webkit-playsinline','');bgVideo.muted=true;
    await bgVideo.play();
    overlay.classList.add('hidden');started=true;foundCount=0;lostCount=0;isFound=false;setARVisible(false);
  }catch(err){
    console.error(err);errorText.style.display='block';
    errorText.textContent='カメラを起動できませんでした。\n・Safari / Chrome で開いているか\n・GitHub Pages の URL で開いているか\n・カメラ権限を許可しているか\n\n詳細: '+(err?.message||err);
    retryBtn.style.display='inline-block';startBtn.disabled=false;
  }
}
function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}}

/* ── 検出 ── */
function analyzeWindow(data,sw,sh,rect){
  const x0=Math.max(0,Math.floor(rect.x)),y0=Math.max(0,Math.floor(rect.y));
  const rw=Math.min(sw-x0,Math.floor(rect.w)),rh=Math.min(sh-y0,Math.floor(rect.h));
  if(rw<20||rh<20)return null;
  const tx0=x0+Math.floor(rw*.18),ty0=y0+Math.floor(rh*.15);
  const trw=Math.floor(rw*.64),trh=Math.floor(rh*.60);
  const bth=Math.max(6,Math.floor(Math.min(rw,rh)*.10));
  let total=0,white=0,black=0,blue=0,textT=0,textD=0,borderT=0,borderB=0;
  for(let y=y0;y<y0+rh;y+=2){
    for(let x=x0;x<x0+rw;x+=2){
      const i=(y*sw+x)*4,r=data[i],g=data[i+1],b=data[i+2];
      const lum=.299*r+.587*g+.114*b;
      total++;
      if(lum>168)white++;if(lum<105)black++;if(b>90&&b>r+12&&b>g+8)blue++;
      const nb=(x<x0+bth)||(x>x0+rw-bth)||(y<y0+bth)||(y>y0+rh-bth);
      if(nb){borderT++;if(b>90&&b>r+12&&b>g+8)borderB++;}
      if(x>=tx0&&x<tx0+trw&&y>=ty0&&y<ty0+trh){textT++;if(lum<110)textD++;}
    }
  }
  if(!total||!textT||!borderT)return null;
  return{whiteRatio:white/total,blackRatio:black/total,blueRatio:blue/total,
         textDarkRatio:textD/textT,borderBlueRatio:borderB/borderT,areaRatio:(rw*rh)/(sw*sh)};
}
function scoreMarker(m){
  if(!m)return 0;let s=0;
  if(m.whiteRatio>.32&&m.whiteRatio<.92)s++;
  if(m.blackRatio>.025&&m.blackRatio<.34)s++;
  if(m.textDarkRatio>.035&&m.textDarkRatio<.48)s++;
  if(m.blueRatio>.003)s++;
  if(m.borderBlueRatio>.004)s++;
  if(m.areaRatio>.10&&m.areaRatio<.72)s++;
  return s;
}
function findBestMarker(data,sw,sh){
  const wins=[{x:sw*.10,y:sh*.08,w:sw*.80,h:sh*.80},{x:sw*.18,y:sh*.12,w:sw*.64,h:sh*.72},{x:sw*.24,y:sh*.16,w:sw*.52,h:sh*.62}];
  let best=null,bestScore=-1;
  for(const r of wins){const m=analyzeWindow(data,sw,sh,r);const s=scoreMarker(m);if(s>bestScore){bestScore=s;best=m;}}
  return{best,bestScore};
}
function detectLoop(){
  requestAnimationFrame(detectLoop);
  if(!started||!bgVideo.videoWidth)return;
  if(++frameCount%2!==0)return;
  try{
    procCtx.drawImage(bgVideo,0,0,SCAN_W,SCAN_H);
    const{data}=procCtx.getImageData(0,0,SCAN_W,SCAN_H);
    const{best,bestScore}=findBestMarker(data,SCAN_W,SCAN_H);
    const detected=!!best&&bestScore>=5;
    if(detected){foundCount++;lostCount=0;if(foundCount>=FOUND_NEED)onMarkerFound();}
    else{lostCount++;foundCount=0;if(lostCount>=LOST_NEED)onMarkerLost();}
  }catch(e){console.error(e);}
}

startBtn.addEventListener('click',startCamera);
retryBtn.addEventListener('click',startCamera);
window.addEventListener('beforeunload',stopCamera);
preloadImages();setARVisible(false);detectLoop();
})();
</script>
