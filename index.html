<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>水龍神AR（step1→2→3）</title>

  <!-- A-Frame / AR.js -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }
    #hud{
      position: fixed; left: 14px; top: 14px; z-index: 9999;
      background: rgba(0,0,0,.55); color:#fff; padding: 12px 14px; border-radius: 14px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      line-height: 1.5; max-width: min(92vw, 560px);
      backdrop-filter: blur(6px);
    }
    #hud .row{ display:flex; gap:10px; align-items:center; flex-wrap: wrap; }
    #badge{
      display:inline-block; padding: 4px 10px; border-radius:999px;
      background:#8b5a00; color:#fff; font-weight:700; letter-spacing:.02em;
    }
    #status{ opacity:.95; }
    #mini{ opacity:.85; font-size: 12px; margin-top:6px; }
    #guide{
      position: fixed; right: 14px; top: 110px; z-index: 9998;
      width: min(42vw, 280px); height: min(56vh, 360px);
      border: 2px dashed rgba(255,255,255,.35);
      border-radius: 18px;
      pointer-events:none;
      box-shadow: 0 0 0 6px rgba(0,0,0,.25) inset;
    }
  </style>
</head>

<body>
  <div id="hud">
    <div class="row">
      <div style="font-weight:800;">手順：</div>
      <div>カメラ許可 → 壁の「水龍神マーカー」をガイド枠に入れてください</div>
    </div>
    <div class="row" style="margin-top:8px;">
      <span id="badge">WAIT</span>
      <span id="status">表示中：-</span>
    </div>
    <div id="mini">
      camera: <span id="camStat">…</span> ／ patt: <span id="pattStat">…</span>
    </div>
  </div>
  <div id="guide"></div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; colorManagement: true; alpha: true"
    arjs="
      sourceType: webcam;
      debugUIEnabled: false;

      /* できるだけ高解像度で起動（端末により自動で落ちます） */
      sourceWidth: 1280;
      sourceHeight: 720;
      displayWidth: 1280;
      displayHeight: 720;

      /* 認識を少しでも速く */
      maxDetectionRate: 60;

      /* パターンマーカー */
      detectionMode: mono;
    "
  >
    <!-- マーカー（pattern-marker.patt をリポジトリ直下に配置済み想定） -->
    <a-marker
      id="marker"
      type="pattern"
      url="pattern-marker.patt"
    >
      <!-- 画像表示（2枚をクロスフェードで切替） -->
      <a-entity id="contentRoot" visible="false">
        <!-- marker平面上に出す：Zを少し手前、Yを少し上げる -->
        <a-entity id="panel" position="0 0 0.02" rotation="0 0 0" scale="1 1 1">
          <!-- 表示面：縦長でも収まりやすいように高さ基準 -->
          <a-image
            id="imgA"
            src="step1.png"
            position="0 0 0"
            rotation="0 0 0"
            width="1.2"
            height="1.6"
            material="transparent:true; opacity: 1"
          ></a-image>

          <a-image
            id="imgB"
            src="step2.png"
            position="0 0 0.001"
            rotation="0 0 0"
            width="1.2"
            height="1.6"
            material="transparent:true; opacity: 0"
          ></a-image>
        </a-entity>
      </a-entity>
    </a-marker>

    <!-- カメラ -->
    <a-entity camera="near: 0.01; far: 10000"></a-entity>
  </a-scene>

  <script>
    // ===== 設定 =====
    const STEPS = ["step1.png", "step2.png", "step3.png"]; // ①→②→③
    const STEP_MS = 3000;     // 3秒
    const FADE_MS = 700;      // ふわっと（感動寄せ）
    const HOLD_AFTER_FOUND_MS = 0; // 見つけた瞬間に開始

    // ===== HUD =====
    const badge = document.getElementById("badge");
    const statusEl = document.getElementById("status");
    const camStat = document.getElementById("camStat");
    const pattStat = document.getElementById("pattStat");

    // ===== A-Frame elements =====
    const marker = document.getElementById("marker");
    const contentRoot = document.getElementById("contentRoot");
    const imgA = document.getElementById("imgA");
    const imgB = document.getElementById("imgB");

    // ===== 状態 =====
    let found = false;
    let timer = null;
    let stepIndex = 0;
    let front = "A"; // 現在見えているのはAかB

    // フェードユーティリティ（opacityを時間で補間）
    function tweenOpacity(el, from, to, ms) {
      return new Promise((resolve) => {
        const start = performance.now();
        function tick(now) {
          const t = Math.min(1, (now - start) / ms);
          const v = from + (to - from) * t;
          el.setAttribute("material", "transparent:true; opacity:" + v.toFixed(3));
          if (t < 1) requestAnimationFrame(tick);
          else resolve();
        }
        requestAnimationFrame(tick);
      });
    }

    function setHudWait() {
      badge.textContent = "WAIT";
      badge.style.background = "#8b5a00";
      statusEl.textContent = "表示中：-";
    }
    function setHudFound(n) {
      badge.textContent = "FOUND";
      badge.style.background = "#0f7a2b";
      statusEl.textContent = "表示中：" + n;
    }

    // 画像の「縦横比」を見て、marker上での見え方を安定化（縦長でもはみ出しにくい）
    // A-Frameのa-imageは width/height を固定なので、ここは「縦長前提」で整えてます。
    // もっと大きく/小さくしたい場合は width/height を変えてOKです。

    async function crossFadeTo(nextSrc) {
      const frontEl = (front === "A") ? imgA : imgB;
      const backEl  = (front === "A") ? imgB : imgA;

      // 次を裏に仕込む
      backEl.setAttribute("src", nextSrc);

      // クロスフェード
      await Promise.all([
        tweenOpacity(frontEl, 1, 0, FADE_MS),
        tweenOpacity(backEl,  0, 1, FADE_MS)
      ]);

      // 表示面を入れ替え
      front = (front === "A") ? "B" : "A";
    }

    function startSequence() {
      stopSequence();

      // 初期状態：①を確実に表示
      stepIndex = 0;
      front = "A";
      imgA.setAttribute("src", STEPS[0]);
      imgA.setAttribute("material", "transparent:true; opacity:1");
      imgB.setAttribute("src", STEPS[1]);
      imgB.setAttribute("material", "transparent:true; opacity:0");

      setHudFound(1);
      contentRoot.setAttribute("visible", "true");

      // 3秒ごとに 2→3→1… と回す
      timer = setInterval(async () => {
        if (!found) return;

        stepIndex = (stepIndex + 1) % STEPS.length;
        const showNum = stepIndex + 1;
        setHudFound(showNum);

        await crossFadeTo(STEPS[stepIndex]);
      }, STEP_MS);
    }

    function stopSequence() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      contentRoot.setAttribute("visible", "false");
      setHudWait();
    }

    // ===== マーカー検出イベント =====
    marker.addEventListener("markerFound", () => {
      found = true;
      setHudFound(stepIndex + 1);

      // 見つけたタイミングで開始（遅延させたいなら HOLD_AFTER_FOUND_MS を調整）
      setTimeout(() => {
        if (found) startSequence();
      }, HOLD_AFTER_FOUND_MS);
    });

    marker.addEventListener("markerLost", () => {
      found = false;
      stopSequence();
    });

    // ===== カメラ / patt 読み込み状況の簡易表示 =====
    // camera: OK (WxH) 表示を、端末差を吸収しつつ分かる範囲で出します。
    function updateCameraStat() {
      const video = document.querySelector("video");
      if (!video) { camStat.textContent = "…"; return; }
      const w = video.videoWidth || 0;
      const h = video.videoHeight || 0;
      if (w && h) camStat.textContent = `OK (${w}x${h})`;
      else camStat.textContent = "OK (starting...)";
    }

    async function updatePattStat() {
      try {
        const res = await fetch("pattern-marker.patt", { cache: "no-store" });
        const txt = await res.text();
        pattStat.textContent = `OK (${txt.length} chars)`;
      } catch (e) {
        pattStat.textContent = "NG (fetch error)";
      }
    }

    // 起動後に数回更新（iOS/Androidで videoWidth が遅れて入るため）
    setHudWait();
    updatePattStat();
    setInterval(updateCameraStat, 500);
    setTimeout(updatePattStat, 1500);

    // 重要：iOSで黒画面になりやすい時の保険（タップで再開）
    // （カメラが止まっている/権限周りの復帰に効くことがあります）
    document.body.addEventListener("click", () => {
      const video = document.querySelector("video");
      if (video && video.paused) video.play().catch(()=>{});
    }, { passive: true });
  </script>
</body>
</html>
